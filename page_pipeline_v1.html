<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDC WORKSPACE — Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--carta:#F5F0E8;--nero:#1C1C1C;--bianco:#FAFAF5;--maker:#4A7C59;--maker-bg:#C7DFCF;--maker-mid:#5D9C71;--athlete:#2B5F9E;--athlete-bg:#D9E6F3;--life:#C2193A;--life-bg:#F5E0E6;--sabbia:#C4A865;--sabbia-dk:#8A6D3B;--sabbia-bg:#E9DFC9;--grigio:#6B6B6B;--border:#ddd6cb;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Jost',sans-serif;background:var(--carta);color:var(--nero);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-bottom:60px;}
@media(prefers-color-scheme:dark){
  :root{--carta:#1A1A1A;--bianco:#242424;--nero:#F0EBE1;--border:#3A3A3A;--grigio:#9A9A9A;}
  .hero-stats,.section-card,.co-card{background:var(--bianco);border-color:var(--border);}
  .back-btn{background:#2E2E2E;border-color:var(--border);}
  .search-input{background:#2E2E2E;border-color:var(--border);color:var(--nero);}
  .search-input::placeholder{color:#555;}
  .filter-pill{background:#2E2E2E;border-color:var(--border);color:var(--grigio);}
  .filter-pill.active{background:var(--nero);color:var(--carta);border-color:var(--nero);}
  .step-badge{background:#2E2E2E;}
  #hub-master-svg .logo-G,#hub-master-svg .logo-D,#hub-master-svg .logo-C,
  #hub-master-svg .logo-STUFF,#hub-master-svg .logo-linee{fill:#F0EBE1;}
  .date-chip{background:#2E2E2E;border-color:var(--border);}
  .empty-state{background:var(--bianco);}
  .filters-pill{background:#2E2E2E;border-color:var(--border);color:var(--grigio);}
}

/* ══ HEADER ══ */
.header{width:100%;max-width:540px;padding:20px 16px 12px;display:flex;flex-direction:column;gap:10px;}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.gdc-logo-wrap{display:flex;align-items:center;}

.date-chip{display:flex;align-items:center;gap:6px;background:var(--bianco);border:1.5px solid var(--border);border-radius:999px;padding:5px 12px;font-size:.75rem;font-weight:700;cursor:pointer;transition:border-color .2s;user-select:none;}
.date-chip:hover{border-color:var(--nero);}
.date-chip-dot{width:7px;height:7px;border-radius:50%;background:var(--sabbia);flex-shrink:0;}

/* ══ BACK + TITLE ══ */
.back-btn{display:inline-flex;align-items:center;gap:6px;background:var(--bianco);border:1.5px solid var(--border);border-radius:999px;padding:5px 12px;font-size:.75rem;font-weight:700;color:var(--grigio);cursor:pointer;text-decoration:none;transition:border-color .15s,color .15s;align-self:flex-start;}
.back-btn:hover{border-color:var(--nero);color:var(--nero);}
.page-title{font-size:1.4rem;font-weight:800;letter-spacing:-.02em;}
.page-sub{font-size:.78rem;color:var(--grigio);}

/* ══ CONTENT ══ */
.content{width:100%;max-width:540px;padding:0 16px;display:flex;flex-direction:column;gap:12px;}

/* ══ STATS ══ */
.hero-stats{background:var(--bianco);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;}
.stat-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:0 8px;}
.stat-item:not(:last-child){border-right:1.5px solid var(--border);}
.stat-num{font-size:1.5rem;font-weight:800;letter-spacing:-.03em;line-height:1;}
.stat-lbl{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--grigio);text-align:center;}

/* ══ SEARCH ══ */
.search-wrap{position:relative;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--grigio);font-size:.9rem;pointer-events:none;}
.search-input{width:100%;padding:10px 12px 10px 34px;background:var(--bianco);border:1.5px solid var(--border);border-radius:12px;font-family:'Jost',sans-serif;font-size:.82rem;color:var(--nero);outline:none;transition:border-color .2s;}
.search-input:focus{border-color:var(--sabbia);}
.search-input::placeholder{color:#AAA4A0;}

/* ══ FILTRI PILL ══ */
.filters-bar{display:flex;}
.filters-pill{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:999px;background:var(--bianco);border:1.5px solid var(--border);font-size:.76rem;font-weight:700;color:var(--grigio);cursor:pointer;transition:all .15s;font-family:'Jost',sans-serif;}
.filters-pill:hover{border-color:var(--grigio);color:var(--nero);}
.filters-pill.active{background:var(--sabbia);border-color:var(--sabbia-dk);color:var(--nero);}

/* ══ PANNELLO FILTRI (bottom sheet) ══ */
.filters-overlay{position:fixed;inset:0;background:rgba(28,28,28,.4);z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;display:flex;align-items:flex-end;justify-content:center;}
.filters-overlay.open{opacity:1;pointer-events:auto;}
.filters-sheet{width:100%;max-width:540px;background:var(--bianco);border-radius:20px 20px 0 0;padding:18px 16px 24px;transform:translateY(100%);transition:transform .25s cubic-bezier(.22,.8,.36,1);max-height:80vh;overflow-y:auto;}
.filters-overlay.open .filters-sheet{transform:translateY(0);}
.filters-sheet-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.filters-sheet-title{font-size:.95rem;font-weight:800;}
.filters-close{width:28px;height:28px;border-radius:50%;border:none;background:var(--carta);color:var(--grigio);font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.filters-section{margin-bottom:16px;}
.filters-section-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--grigio);margin-bottom:8px;}
.filters-chip-row{display:flex;flex-wrap:wrap;gap:7px;}
.filter-pill{flex-shrink:0;padding:6px 13px;border-radius:999px;background:var(--carta);border:1.5px solid var(--border);font-size:.74rem;font-weight:700;color:var(--grigio);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'Jost',sans-serif;}
.filter-pill.active{background:var(--sabbia);border-color:var(--sabbia-dk);color:var(--nero);}
.filter-pill:hover:not(.active){border-color:var(--grigio);color:var(--nero);}
.sort-pill{flex-shrink:0;display:flex;align-items:center;gap:3px;padding:6px 13px;border-radius:999px;background:var(--carta);border:1.5px solid var(--border);font-size:.74rem;font-weight:700;color:var(--grigio);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'Jost',sans-serif;}
.sort-pill.active{background:var(--athlete);border-color:var(--athlete);color:#fff;}
.sort-pill:hover:not(.active){border-color:var(--grigio);color:var(--nero);}
.sort-arrow{font-size:.7rem;}
.filters-reset-btn{width:100%;padding:10px;border-radius:12px;background:none;border:1.5px solid var(--border);color:var(--grigio);font-size:.76rem;font-weight:700;cursor:pointer;font-family:'Jost',sans-serif;transition:all .15s;}
.filters-reset-btn:hover{border-color:var(--life);color:var(--life);}

@media(prefers-color-scheme:dark){
  .filters-sheet{background:var(--bianco);}
  .filters-close{background:#1A1A1A;}
  .filter-pill,.sort-pill{background:#1A1A1A;border-color:var(--border);}
}

/* ══ SECTION LABEL ══ */
.section-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--grigio);padding:0 2px;}

/* ══ COMPANY CARD ══ */
.co-list{display:flex;flex-direction:column;gap:8px;}
.co-card{background:var(--bianco);border:1.5px solid var(--border);border-radius:14px;padding:13px 14px;display:flex;align-items:center;gap:11px;text-decoration:none;color:var(--nero);transition:border-color .15s,transform .1s;cursor:pointer;}
.co-card:hover{border-color:var(--sabbia);transform:translateY(-1px);}
.co-card:active{transform:scale(.99);}
.co-card.refused{border-color:var(--life-bg);opacity:.7;}
.co-card.refused:hover{border-color:var(--life);}

.step-badge{width:38px;height:38px;border-radius:10px;background:var(--sabbia-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.step-badge.done{background:var(--maker-bg);}
.step-badge.refused{background:var(--life-bg);}
.step-badge.hot{background:var(--sabbia-bg);}
.step-num{font-size:.65rem;font-weight:800;line-height:1;}
.step-badge.done .step-num{color:var(--maker-dk);}
.step-badge.refused .step-num{color:var(--life);}
.step-badge.hot .step-num{color:var(--sabbia-dk);}

.co-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;}
.co-name{font-size:.88rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.co-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.tag{font-size:.6rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:999px;border:1.5px solid;}
.tag-settore{background:var(--sabbia-bg);color:#7A5C20;border-color:var(--sabbia);}
.tag-lingua{background:var(--athlete-bg);color:var(--athlete);border-color:var(--athlete);}
.tag-score-hi{background:var(--maker-bg);color:var(--maker-dk);border-color:var(--maker);}
.tag-score-mid{background:var(--sabbia-bg);color:var(--sabbia-dk);border-color:var(--sabbia);}
.tag-score-lo{background:var(--border);color:var(--grigio);border-color:var(--grigio);}
.co-step-name{font-size:.68rem;color:var(--grigio);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.co-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.fu-badge{font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:999px;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.fu-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.fu-7{background:#FFF9EC;color:var(--sabbia-dk);border:1.5px solid var(--sabbia);}
.fu-14{background:#FFF0E6;color:#C4621A;border:1.5px solid #D4701A;}
.fu-30{background:var(--life-bg);color:var(--life);border:1.5px solid var(--life);}
.co-arrow{color:var(--border);font-size:.9rem;margin-top:2px;}

/* ══ EMPTY STATE ══ */
.empty-state{background:var(--bianco);border:1.5px solid var(--border);border-radius:14px;padding:32px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;}
.empty-icon{font-size:2rem;opacity:.4;}
.empty-title{font-size:.88rem;font-weight:700;color:var(--grigio);}
.empty-sub{font-size:.72rem;color:var(--grigio);opacity:.7;}

/* ══ ADD BTN ══ */
.add-fab{position:fixed;bottom:24px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--sabbia);border:none;display:flex;align-items:center;justify-content:center;font-size:1.4rem;cursor:pointer;box-shadow:0 4px 16px rgba(196,168,101,.4);transition:transform .15s,background .15s;z-index:50;}
.add-fab:hover{background:var(--sabbia-dk);transform:scale(1.08);}
.add-fab:active{transform:scale(.95);}
</style>
</head>

<!-- FAB aggiungi azienda -->

<script>
// ─── CONFIG SUPABASE ─────────────────────────────────────────────────────────
const SUPA_URL = 'https://pnzabwfsgkvejnrtrjcp.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBuemFid2ZzZ2t2ZWpucnRyamNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NTg4OTIsImV4cCI6MjA5NDQzNDg5Mn0.xhnaMOxdymJSfLy77jhPo2w0K7j3z_tSgeRozqifSlk';

const STEP_NAMES = {
  1:'Trovata', 2:'Scheda', 3:'Media kit', 4:'Approvato',
  5:'Testo mail', 6:'Bozza Gmail', 7:'Mail inviata', 8:'Risposta',
  9:'Gestita', 10:'Trattativa', 11:'Accordo', 12:'Contratto', 13:'Rifiutato'
};

let COMPANIES = [];
let activeFilter = 'tutte';
let scoreFilter = 'tutti';
let sortBy = 'step';
let sortAsc = false;

// ─── FETCH SUPABASE ───────────────────────────────────────────────────────────
async function loadCompanies() {
  document.getElementById('coList').innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-title">Caricamento aziende…</div></div>';
  try {
    const res = await fetch(
      SUPA_URL + '/rest/v1/companies?select=id,nome,settore,lingua,score,tag,step_attuale,data_mail_inviata,note,a7_status&order=step_attuale.desc',
      { headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY } }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const raw = await res.json();
    // Normalizza colonne al formato interno usato da filtri/render
    COMPANIES = raw.map(c => ({
      id:            c.id,
      name:          c.nome,
      settore:       c.settore || '—',
      lingua:        c.lingua  || 'IT',
      score:         c.score   || 0,
      tag:           c.tag     || '',
      step:          c.step_attuale || 1,
      followup_days: calcFollowup(c.data_mail_inviata, c.step_attuale),
      contact_date:  c.data_mail_inviata || null,
      note:          c.note    || '',
      a7_status:     c.a7_status || ''
    }));
    renderStats();
    applyFilters();
  } catch(e) {
    document.getElementById('coList').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Errore caricamento</div><div class="empty-sub">' + e.message + '</div></div>';
    console.error('Supabase fetch error:', e);
  }
}

// Calcola giorni di follow-up da data_mail_inviata (solo se step 7-9)
function calcFollowup(data_mail, step) {
  if (!data_mail || step < 7 || step > 9) return null;
  const days = Math.floor((Date.now() - new Date(data_mail).getTime()) / 86400000);
  return days > 0 ? days : null;
}

// ─── FILTRI ──────────────────────────────────────────────────────────────────
function setFilter(f, el){
  activeFilter = f;
  document.querySelectorAll('[data-filter]').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function setScoreFilter(f, el){
  scoreFilter = f;
  document.querySelectorAll('[data-score]').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function setSort(s, el){
  if(sortBy === s){
    sortAsc = !sortAsc;
  } else {
    sortBy = s;
    sortAsc = (s === 'nome'); // nome parte A→Z, i numerici partono dal più alto
  }
  document.querySelectorAll('.sort-pill').forEach(p => {
    p.classList.remove('active');
    const a = p.querySelector('.sort-arrow');
    if(a) a.remove();
  });
  el.classList.add('active');
  const arrow = document.createElement('span');
  arrow.className = 'sort-arrow';
  arrow.textContent = sortAsc ? '↑' : '↓';
  el.appendChild(arrow);
  applyFilters();
}

function openFiltersPanel(){ document.getElementById('filtersOverlay').classList.add('open'); }
function closeFiltersPanel(e){
  if(e && e.target !== e.currentTarget) return;
  document.getElementById('filtersOverlay').classList.remove('open');
}

function resetFilters(){
  activeFilter = 'tutte'; scoreFilter = 'tutti'; sortBy = 'step'; sortAsc = false;
  document.querySelectorAll('[data-filter]').forEach(p => p.classList.toggle('active', p.dataset.filter === 'tutte'));
  document.querySelectorAll('[data-score]').forEach(p => p.classList.toggle('active', p.dataset.score === 'tutti'));
  document.querySelectorAll('.sort-pill').forEach(p => {
    p.classList.remove('active');
    const a = p.querySelector('.sort-arrow');
    if(a) a.remove();
  });
  const stepPill = document.querySelector('.sort-pill[data-sort="step"]');
  stepPill.classList.add('active');
  stepPill.insertAdjacentHTML('beforeend', '<span class="sort-arrow">↓</span>');
  applyFilters();
}

function updateFiltersPillLabel(){
  let count = 0;
  if(activeFilter !== 'tutte') count++;
  if(scoreFilter !== 'tutti') count++;
  const btn = document.getElementById('filtersPillBtn');
  const lbl = document.getElementById('filtersPillLabel');
  lbl.textContent = count > 0 ? 'Filtri · ' + count : 'Filtri';
  btn.classList.toggle('active', count > 0);
}

function filterCompany(c){
  const q = document.getElementById('searchInput').value.toLowerCase();
  if(q && !c.name.toLowerCase().includes(q) && !c.settore.toLowerCase().includes(q)) return false;
  if(activeFilter === 'outreach'   && !(c.step >= 1 && c.step <= 7))   return false;
  if(activeFilter === 'risposta'   && !(c.step >= 8 && c.step <= 9))   return false;
  if(activeFilter === 'trattativa' && !(c.step >= 10 && c.step <= 12)) return false;
  if(activeFilter === 'rifiutate'  && c.step !== 13) return false;
  if(scoreFilter === 'alto'  && !(c.score >= 7)) return false;
  if(scoreFilter === 'medio' && !(c.score >= 5 && c.score <= 6)) return false;
  if(scoreFilter === 'basso' && !(c.score >= 1 && c.score <= 4)) return false;
  return true;
}

function applyFilters(){
  const filtered = COMPANIES.filter(filterCompany);
  filtered.sort((a, b) => {
    // Data contatto: gestita a parte — aziende senza data vanno sempre in fondo, in entrambe le direzioni
    if(sortBy === 'contatto'){
      const at = a.contact_date ? new Date(a.contact_date).getTime() : null;
      const bt = b.contact_date ? new Date(b.contact_date).getTime() : null;
      if(at === null && bt === null) return 0;
      if(at === null) return 1;
      if(bt === null) return -1;
      return sortAsc ? at - bt : bt - at; // asc = dal più vecchio, desc = dal più recente
    }
    let av, bv;
    if(sortBy === 'score')        { av = a.score;               bv = b.score; }
    else if(sortBy === 'followup'){ av = a.followup_days || 0;   bv = b.followup_days || 0; }
    else if(sortBy === 'nome')    { av = a.name.toLowerCase();   bv = b.name.toLowerCase(); }
    else                          { av = a.step;                 bv = b.step; } // step (default)
    if(av < bv) return sortAsc ? -1 : 1;
    if(av > bv) return sortAsc ? 1 : -1;
    return 0;
  });
  renderList(filtered);
  updateFiltersPillLabel();
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function stepBadgeClass(step){
  if(step === 13) return 'refused';
  if(step >= 10)  return 'hot';
  if(step >= 7)   return 'done';
  return '';
}

function scoreTagClass(score){
  if(score >= 7) return 'tag-score-hi';   // 7-10: buon fit / fit perfetto
  if(score >= 5) return 'tag-score-mid';  // 5-6: fit parziale
  return 'tag-score-lo';                  // 1-4: basso fit
}

function fuHtml(days){
  if(!days) return '';
  var cls = days <= 7 ? 'fu-7' : days <= 14 ? 'fu-14' : 'fu-30';
  return '<div class="fu-badge '+cls+'"><div class="fu-dot"></div>+'+days+'gg</div>';
}

function renderList(list){
  const el = document.getElementById('coList');
  if(!list.length){
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">Nessuna azienda trovata</div><div class="empty-sub">Prova a cambiare filtro o ricerca</div></div>';
    return;
  }
  el.innerHTML = list.map(c => {
    var bc = stepBadgeClass(c.step);
    var sc = scoreTagClass(c.score);
    var refused = c.step === 13;
    return '<a class="co-card'+(refused?' refused':'')+'" href="page_company_v2.html?id='+c.id+'">' +
      '<div class="step-badge '+bc+'">' +
        '<div class="step-num">'+(refused?'✕':c.step)+'</div>' +
      '</div>' +
      '<div class="co-info">' +
        '<div class="co-name">'+c.name+'</div>' +
        '<div class="co-meta">' +
          '<span class="tag tag-settore">'+c.settore+'</span>' +
          '<span class="tag tag-lingua">'+c.lingua+'</span>' +
          '<span class="tag '+sc+'">'+c.score+'</span>' +
        '</div>' +
        '<div class="co-step-name">Step '+c.step+' — '+STEP_NAMES[c.step]+(c.note?' · '+c.note:'')+'</div>' +
      '</div>' +
      '<div class="co-right">' +
        fuHtml(c.followup_days) +
        '<span class="co-arrow">›</span>' +
      '</div>' +
    '</a>';
  }).join('');
}

// ─── STATS ───────────────────────────────────────────────────────────────────
function renderStats(){
  var attive = COMPANIES.filter(c => c.step >= 1 && c.step <= 12).length;
  var avgScore = Math.round(COMPANIES.filter(c=>c.step!==13).reduce((s,c)=>s+c.score,0) /
                            COMPANIES.filter(c=>c.step!==13).length);
  document.getElementById('statTotale').textContent = COMPANIES.length;
  document.getElementById('statAttive').textContent = attive;
  document.getElementById('statScore').textContent  = avgScore;
  document.getElementById('pipelineSub').textContent = attive + ' in corso · ' +
    COMPANIES.filter(c=>c.step===13).length + ' archiviate';
}

// ─── DATE ────────────────────────────────────────────────────────────────────
function renderDate(){
  var now = new Date();
  var lbl = now.toLocaleDateString('it-IT',{day:'numeric',month:'short'}).toUpperCase();
  document.getElementById('dateLabel').textContent = lbl;
}

// ─── LOGO STAGGER ────────────────────────────────────────────────────────────
function animateLogo(){
  var groups = ['logo-G','logo-D','logo-C','logo-STUFF','logo-linee'];
  groups.forEach(function(g, i){
    setTimeout(function(){
      document.querySelectorAll('#hub-master-svg .'+g)
        .forEach(function(el){ el.style.opacity = '1'; });
    }, i * 260);
  });
}

// ─── INIT ────────────────────────────────────────────────────────────────────
renderDate();
/* ══ GDC LOGO MASTER ANIM ══ */
(function(){
  const svg=document.getElementById('hub-master-svg'); if(!svg) return;
  const G=svg.querySelector('.logo-G'), D=svg.querySelector('.logo-D');
  const C=svg.querySelector('.logo-C'), STUFF=svg.querySelector('.logo-STUFF');
  const linee=svg.querySelector('.logo-linee');
  [G,D,C,STUFF,linee].forEach(el=>{ el.style.opacity='0'; el.style.transition='opacity .22s ease'; });
  setTimeout(()=>G.style.opacity='1',     200);
  setTimeout(()=>D.style.opacity='1',     460);
  setTimeout(()=>C.style.opacity='1',     720);
  setTimeout(()=>STUFF.style.opacity='1', 980);
  setTimeout(()=>linee.style.opacity='1',1240);
})();
loadCompanies();
</script>
