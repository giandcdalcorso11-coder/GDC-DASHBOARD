name: Pipeline Watcher

on:
  schedule:
    # Ogni ora, tutti i giorni. Controlla step 3->4 (PDF su Drive) e
    # step 6->7 (bozza Gmail inviata) per tutte le aziende in quegli
    # step. Vedi pipeline_watcher.py per i dettagli.
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-watcher:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements_a7.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements_a7.txt

      - name: Run Pipeline Watcher
        env:
          GOOGLE_CREDENTIALS:   ${{ secrets.GOOGLE_CREDENTIALS }}
          GMAIL_CLIENT_ID:      ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET:  ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN:  ${{ secrets.GMAIL_REFRESH_TOKEN }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pipeline_watcher.py
