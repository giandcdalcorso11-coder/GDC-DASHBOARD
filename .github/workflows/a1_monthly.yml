name: A1 Monthly — Instagram Analytics + BPT Calendar

on:
  schedule:
    - cron: '0 6 2 * *'
  workflow_dispatch:

jobs:

  run-a1-monthly:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Installa dipendenze
        run: pip install -r scripts/requirements.txt

      - name: Esegui A1 Monthly
        env:
          IG_ACCESS_TOKEN:    ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID:         ${{ secrets.IG_USER_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          DRIVE_FOLDER_A1:    ${{ secrets.DRIVE_FOLDER_A1 }}
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PUSH_SUBSCRIPTION:  ${{ secrets.PUSH_SUBSCRIPTION }}
          VAPID_PRIVATE_KEY:  ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL:        ${{ secrets.VAPID_EMAIL }}
          GMAIL_CLIENT_ID:     ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: python scripts/a1_monthly.py

      - name: Notifica fallimento A1
        if: failure()
        run: echo "❌ A1 Monthly FALLITO — controlla i log"

  run-bpt-calendar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Installa dipendenze Python
        run: pip install -r scripts/requirements.txt

      - name: Installa dipendenze sistema per Playwright (Ubuntu 24)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2 \
            xvfb

      - name: Installa Playwright Chromium
        run: playwright install chromium

      - name: Esegui BPT Calendar
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          DRIVE_FOLDER_A3:    ${{ secrets.DRIVE_FOLDER_A3 }}
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/bpt_calendar.py

      - name: Notifica fallimento BPT
        if: failure()
        run: echo "❌ BPT Calendar FALLITO — controlla i log"
