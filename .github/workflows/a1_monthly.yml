name: A1 Monthly — Instagram Analytics

on:
  # Ogni 1° del mese alle 08:00 ora italiana (07:00 UTC in estate, 07:00 in inverno)
  # Usiamo 06:00 UTC per avere margine sia in orario solare che legale
  schedule:
    - cron: '0 6 1 * *'

  # Esecuzione manuale dalla tab Actions di GitHub (per test)
  workflow_dispatch:

jobs:
  run-a1-monthly:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Installa dipendenze
        run: pip install -r scripts/requirements.txt

      - name: Esegui A1 Monthly
        env:
          IG_ACCESS_TOKEN:    ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID:         ${{ secrets.IG_USER_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          DRIVE_FOLDER_A1:    ${{ secrets.DRIVE_FOLDER_A1 }}
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          PUSH_SUBSCRIPTION:  ${{ secrets.PUSH_SUBSCRIPTION }}
          VAPID_PRIVATE_KEY:  ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL:        ${{ secrets.VAPID_EMAIL }}
        run: python scripts/a1_monthly.py

      - name: Notifica fallimento
        if: failure()
        run: |
          echo "❌ A1 Monthly FALLITO — controlla i log sopra"
          # Qui puoi aggiungere una notifica email o push in caso di errore
