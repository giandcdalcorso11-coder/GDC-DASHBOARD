name: A7 — Gmail Drafter

on:
  workflow_dispatch:
    inputs:
      company_name:
        description: 'Nome azienda (esatto, come in Drive A6/Aziende/)'
        required: true
        type: string

jobs:
  run-a7:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements_a7.txt

      - name: Run A7 Gmail Drafter
        env:
          COMPANY_NAME:            ${{ github.event.inputs.company_name }}
          DRIVE_FOLDER_A6_AZIENDE: ${{ secrets.DRIVE_FOLDER_A6_AZIENDE }}
          GMAIL_CLIENT_ID:         ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET:     ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN:     ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GOOGLE_CREDENTIALS:      ${{ secrets.GOOGLE_CREDENTIALS }}
          SUPABASE_URL:            ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:    ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/a7_gmail_drafter.py
