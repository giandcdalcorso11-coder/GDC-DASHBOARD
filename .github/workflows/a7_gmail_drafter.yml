name: A7 — Gmail Drafter

on:
  # schedule:
  #   - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      note:
        description: 'Note opzionale per il dispatch manuale'
        required: false

jobs:

  run-a7-gmail-drafter:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements_a7.txt

      - name: Installa dipendenze A7
        run: pip install -r scripts/requirements_a7.txt

      - name: Esegui A7 — Gmail Drafter
        env:
          DRIVE_FOLDER_A6:      ${{ secrets.DRIVE_FOLDER_A6 }}
          GMAIL_CLIENT_ID:      ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET:  ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN:  ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GOOGLE_CREDENTIALS:   ${{ secrets.GOOGLE_CREDENTIALS }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
        run: python scripts/a7_gmail_drafter.py
