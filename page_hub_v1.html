<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDC WORKSPACE — Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --carta:#F5F0E8; --nero:#1C1C1C; --bianco:#FAFAF5;
  --maker:#4A7C59; --maker-bg:#C7DFCF; --maker-mid:#5D9C71;
  --sabbia:#C4A865; --sabbia-dk:#8A6D3B; --sabbia-bg:#E9DFC9;
  --life:#C2193A; --life-mid:#E9415A; --life-bg:#F5E0E6;
  --grigio:#6B6B6B; --border:#ddd6cb;
}
*{ box-sizing:border-box; margin:0; padding:0; }
body{
  font-family:'Jost',sans-serif;
  background:var(--carta);
  color:var(--nero);
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
  padding:0 16px 48px;
}

/* ══ DARK MODE ══ */
@media(prefers-color-scheme:dark){
  :root{
    --carta:#1A1A1A; --bianco:#242424;
    --nero:#F0EBE1; --border:#3A3A3A; --grigio:#9A9A9A;
  }
  .hub-card{ background:var(--bianco); border-color:var(--border); }
  .card-ia:hover{ border-color:var(--maker); }
  .card-studio:hover{ border-color:var(--sabbia); }
}

/* ══ HEADER ══ */
.header{
  width:100%; max-width:480px;
  padding:28px 0 18px;
  display:flex; flex-direction:column; align-items:center; gap:3px;
}
.gdc-logo-wrap{ display:flex; align-items:center; justify-content:center; }

/* SVG master header: gruppi partono opacity:0, animati via JS */
#hub-master-svg .logo-G,
#hub-master-svg .logo-D,
#hub-master-svg .logo-C,
#hub-master-svg .logo-STUFF,
#hub-master-svg .logo-linee {
  opacity:0;
  transition: opacity .22s ease;
}

.header-sub{
  font-size:.68rem; font-weight:700; letter-spacing:.12em;
  text-transform:uppercase; color:var(--grigio); margin-top:6px;
}

/* ══ SCEGLI ══ */
.choose-label{
  font-size:.7rem; font-weight:700; letter-spacing:.1em;
  text-transform:uppercase; color:var(--grigio);
  margin:4px 0 16px; text-align:center;
}

/* ══ CARDS ══ */
.cards-wrap{
  width:100%; max-width:480px;
  display:grid;
  grid-template-rows:1fr 1fr;
  gap:14px;
}

.hub-card{
  position:relative; overflow:hidden;
  background:var(--bianco);
  border:1.5px solid var(--border);
  border-radius:20px;
  padding:20px 20px 18px;
  cursor:pointer;
  text-decoration:none; color:inherit;
  transition:border-color .2s, transform .18s, box-shadow .18s;
  display:flex; flex-direction:column; justify-content:space-between;
  min-height:148px;
  opacity:0; transform:translateY(18px);
}
.hub-card.visible{
  animation:cardIn .4s cubic-bezier(.22,.8,.36,1) forwards;
}
.hub-card:nth-child(2).visible{ animation-delay:.12s; }
@keyframes cardIn{ to{ opacity:1; transform:translateY(0); } }

.hub-card::after{
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.14) 0%,transparent 55%);
  pointer-events:none;
}
.hub-card:hover{ transform:translateY(-2px); box-shadow:0 8px 28px rgba(28,28,28,.1); }
.card-ia:hover     { border-color:var(--maker); }
.card-studio:hover { border-color:var(--sabbia); }

/* top row */
.card-top{
  display:flex; align-items:center;
  justify-content:space-between; gap:10px; margin-bottom:14px;
}
.card-title{
  font-size:1.18rem; font-weight:800; letter-spacing:-.02em;
}

/* arrow */
.card-arrow{
  width:28px; height:28px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:background .2s, transform .2s;
}
.card-ia     .card-arrow{ background:var(--maker-bg); color:var(--maker); }
.card-studio .card-arrow{ background:var(--sabbia-bg); color:var(--sabbia-dk); }
.hub-card:hover .card-arrow{ transform:translateX(3px); }
.card-ia:hover     .card-arrow{ background:var(--maker);  color:#fff; }
.card-studio:hover .card-arrow{ background:var(--sabbia); color:#fff; }

/* ══ STRIP AGENTI ══ */
.agent-strip{
  display:flex;
  gap:6px;
  align-items:center;
  justify-content:center;
  overflow-x:auto;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
  padding:2px 0 4px;
  margin-top:-38px;
  /* nasconde scrollbar su webkit */
}
.agent-strip::-webkit-scrollbar{ display:none; }

.agent-icon{
  flex-shrink:0;
  width:46px; height:46px; border-radius:11px;
  display:flex; align-items:center; justify-content:center;
  transition: transform .35s cubic-bezier(.22,.8,.36,1), background .5s;
  /* stato iniziale: life */
  background: var(--life-bg);
}
/* colori elementi SVG — stato life (rosso) */
.icon-life #a1-outer{ fill:#C2193A; }
.icon-life #a1-inner{ fill:#E9415A; }
.icon-life #a1-dot  { fill:#C2193A; }
.icon-life #a1-label{ fill:#E9415A; }

.icon-life #a2-bar1{ fill:#C2193A; }
.icon-life #a2-bar2{ fill:#E9415A; }
.icon-life #a2-bar3{ fill:#C2193A; }
.icon-life #a2-bar4{ fill:none; stroke:#E9415A; stroke-width:5; stroke-dasharray:9 7; }
.icon-life #a2-label{ fill:#C2193A; }

.icon-life #a3-r1 { fill:#E9415A; }
.icon-life #a3-r2 { fill:#C2193A; }
.icon-life #a3-r3 { fill:none; stroke:#E9415A; stroke-width:5; }
.icon-life #a3-r4 { fill:#E9415A; }
.icon-life #a3-r5 { fill:#C2193A; }
.icon-life #a3-r6 { fill:#C2193A; }
.icon-life #a3-r7 { fill:none; stroke:#E9415A; stroke-width:5; }
.icon-life #a3-r8 { fill:#C2193A; }
.icon-life #a3-arrow{ stroke:#F5E0E6; }
.icon-life #a3-label{ fill:#C2193A; }

.icon-life .doc-rect{ stroke:#C2193A; }
.icon-life .bar     { fill:#E9415A; }
.icon-life .cur-el  { fill:#E9415A; }
.icon-life .lbl     { fill:#C2193A; }

.icon-life .arc-outer{ stroke:#C2193A; }
.icon-life .circ-mid { stroke:#E9415A; }
.icon-life .dot-cent { fill:#C2193A; }
.icon-life .dash-line{ stroke:#E9415A; }
.icon-life .badge    { fill:#E9415A; }

.icon-life .doc-path { stroke:#C2193A; }
.icon-life .fold-path{ stroke:#C2193A; }

.icon-life .env-rect{ stroke:#C2193A; }
.icon-life .env-v   { stroke:#E9415A; }
.icon-life .env-dot { fill:#C2193A; }

/* colori elementi SVG — stato done (verde) */
.icon-done #a1-outer{ fill:#497B58; }
.icon-done #a1-inner{ fill:#5D9C71; }
.icon-done #a1-dot  { fill:#497B58; }
.icon-done #a1-label{ fill:#5D9C71; }

.icon-done #a2-bar1{ fill:#5D9C71; }
.icon-done #a2-bar2{ fill:#4A7C59; }
.icon-done #a2-bar3{ fill:#5D9C71; }
.icon-done #a2-bar4{ fill:none; stroke:#4A7C59; stroke-width:5; stroke-dasharray:9 7; }
.icon-done #a2-label{ fill:#5D9C71; }

.icon-done #a3-r1 { fill:#5D9C71; }
.icon-done #a3-r2 { fill:#4A7C59; }
.icon-done #a3-r3 { fill:none; stroke:#5D9C71; stroke-width:5; }
.icon-done #a3-r4 { fill:#5D9C71; }
.icon-done #a3-r5 { fill:#4A7C59; }
.icon-done #a3-r6 { fill:#4A7C59; }
.icon-done #a3-r7 { fill:none; stroke:#5D9C71; stroke-width:5; }
.icon-done #a3-r8 { fill:#4A7C59; }
.icon-done #a3-arrow{ stroke:#C7DFCF; }
.icon-done #a3-label{ fill:#4A7C59; }

.icon-done .doc-rect{ stroke:#497B58; }
.icon-done .bar     { fill:#5D9C71; }
.icon-done .cur-el  { fill:#5D9C71; }
.icon-done .lbl     { fill:#497B58; }

.icon-done .arc-outer{ stroke:#497B58; }
.icon-done .circ-mid { stroke:#5D9C71; }
.icon-done .dot-cent { fill:#497B58; }
.icon-done .dash-line{ stroke:#5D9C71; }
.icon-done .badge    { fill:#5D9C71; }

.icon-done .doc-path { stroke:#497B58; }
.icon-done .fold-path{ stroke:#497B58; }
.icon-done .lbl      { fill:#497B58; }
.icon-done .bar      { fill:#5D9C71; }

.icon-done .env-rect{ stroke:#497B58; }
.icon-done .env-v   { stroke:#5D9C71; }
.icon-done .env-dot { fill:#497B58; }
.icon-done .lbl     { fill:#497B58; }

/* SVG transition su tutti gli elementi colorati */
.agent-icon svg *{ transition: fill .45s ease, stroke .45s ease; }

/* ══ STUDIO LOGO nella card ══ */
.studio-logo-box{
  width:100%;
  display:flex; align-items:center; justify-content:center;
  padding:4px 0 2px;
}
/* clip per la barretta animata nella card studio */
#studio-clip-rect{ width:0; }

/* ══ FOOTER ══ */
.hub-footer{
  margin-top:32px; font-size:.65rem; color:var(--grigio);
  text-align:center; letter-spacing:.06em;
}
</style>
</head>

<script>
/* ══ GDC LOGO HEADER: sequenza G→D→C→STUFF→linee ══ */
(function(){
  const svg   = document.getElementById('hub-master-svg');
  const G     = svg.querySelector('.logo-G');
  const D     = svg.querySelector('.logo-D');
  const C     = svg.querySelector('.logo-C');
  const STUFF = svg.querySelector('.logo-STUFF');
  const linee = svg.querySelector('.logo-linee');

  [G,D,C,STUFF,linee].forEach(el=>{ el.style.opacity='0'; el.style.transition='opacity .22s ease'; });

  setTimeout(()=>{ G.style.opacity='1'; },      200);
  setTimeout(()=>{ D.style.opacity='1'; },      460);
  setTimeout(()=>{ C.style.opacity='1'; },      720);
  setTimeout(()=>{ STUFF.style.opacity='1'; },  980);
  setTimeout(()=>{ linee.style.opacity='1'; }, 1240);
})();

/* ══ Funzione barretta hotend (riusabile per header e card) ══ */
// x0: punto di partenza x del clip, barW: larghezza totale, hotY: y base triangolo
function startBarAnim(clipId, hotendId, x0, barW, hotY){
  const clipRect = document.getElementById(clipId);
  const hotend   = document.getElementById(hotendId);
  const T_GROW   = 1600;
  const T_HOLD   = 500;
  const T_FADE   = 280;

  function ease(t){ return t<.5?2*t*t:-1+(4-2*t)*t; }

  function setW(w){
    clipRect.setAttribute('width', Math.max(0,w));
    // hotend: traslazione = x0 + w - metà base (11px nello spazio viewBox)
    hotend.setAttribute('transform','translate('+(x0+w-11)+','+hotY+')');
  }

  let phase='grow', st=null;
  function tick(ts){
    if(!st) st=ts;
    const dt=ts-st;
    if(phase==='grow'){
      const p=Math.min(dt/T_GROW,1);
      setW(ease(p)*barW);
      if(p>=1){ phase='hold'; st=ts; }
    } else if(phase==='hold'){
      setW(barW);
      if(dt>=T_HOLD){
        phase='fade'; st=ts;
        hotend.style.transition=`opacity ${T_FADE}ms`;
        hotend.style.opacity='0';
        document.getElementById(clipId.replace('clip-rect','bar-full'))
          && (document.getElementById(clipId.replace('clip-rect','bar-full')).style.transition=`opacity ${T_FADE}ms`);
        // cerca il rect bar-full corrispondente
        if(clipId==='hub-clip-rect'){
          document.getElementById('hub-bar-full').style.transition=`opacity ${T_FADE}ms`;
          document.getElementById('hub-bar-full').style.opacity='0';
        } else {
          document.getElementById('card-bar-full').style.transition=`opacity ${T_FADE}ms`;
          document.getElementById('card-bar-full').style.opacity='0';
        }
      }
    } else if(phase==='fade'){
      if(dt>=T_FADE){
        setW(0);
        hotend.style.transition='none'; hotend.style.opacity='1';
        if(clipId==='hub-clip-rect'){
          document.getElementById('hub-bar-full').style.transition='none';
          document.getElementById('hub-bar-full').style.opacity='1';
        } else {
          document.getElementById('card-bar-full').style.transition='none';
          document.getElementById('card-bar-full').style.opacity='1';
        }
        phase='grow'; st=null;
      }
    }
    requestAnimationFrame(tick);
  }
  setW(0);
  requestAnimationFrame(tick);
}

/* ══ CARD FADE-IN ══ */
(function(){
  setTimeout(()=>document.getElementById('card-ia').classList.add('visible'),     600);
  setTimeout(()=>document.getElementById('card-studio').classList.add('visible'), 720);

  // Avvia barretta card studio dopo card visible
  setTimeout(()=>{ startBarAnim('card-clip-rect','card-hotend',34.04,518.41,428); }, 900);
})();

/* ══ WAVE AGENTI: life → done in sequenza con ingrandimento ══ */
(function(){
  const N = 7;
  const STAGGER  = 280;  // ms tra un agente e il successivo nella wave
  const HOLD_ON  = 3200; // ms tutti verdi prima di tornare rossi
  const HOLD_OFF = 1400; // ms tutti rossi prima della prossima wave

  function waveOn(){
    for(let i=0;i<N;i++){
      setTimeout(()=>{
        const el=document.getElementById('icon-'+i);
        el.classList.remove('icon-life');
        el.classList.add('icon-done');
        el.style.transform='scale(1.22)';
        el.style.background='var(--maker-bg)';
        // dopo picco, torna a scale 1
        setTimeout(()=>{ el.style.transform='scale(1)'; }, 200);
      }, i*STAGGER);
    }
    // dopo che l'ultimo è diventato verde, aspetta HOLD_ON poi torna rosso
    setTimeout(waveOff, (N-1)*STAGGER + HOLD_ON);
  }

  function waveOff(){
    for(let i=0;i<N;i++){
      setTimeout(()=>{
        const el=document.getElementById('icon-'+i);
        el.classList.remove('icon-done');
        el.classList.add('icon-life');
        el.style.background='var(--life-bg)';
      }, i*STAGGER);
    }
    setTimeout(waveOn, (N-1)*STAGGER + HOLD_OFF);
  }

  // Prima wave dopo che le card sono apparse
  setTimeout(waveOn, 1000);
})();
</script>
