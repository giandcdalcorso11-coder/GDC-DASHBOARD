<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDC WORKSPACE — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --carta:#F5F0E8; --nero:#1C1C1C; --bianco:#FAFAF5;
  --maker:#4A7C59; --athlete:#2B5F9E; --life:#C41E5A; --sabbia:#C4A865; --grigio:#6B6B6B;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100vh; font-family:'Jost',sans-serif; background:var(--carta);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; position:relative;
}
body::before{
  content:''; position:absolute; inset:0;
  background:
    radial-gradient(ellipse 55% 40% at 18% 28%, rgba(196,168,101,.14) 0%, transparent 70%),
    radial-gradient(ellipse 45% 35% at 82% 72%, rgba(196,30,90,.09) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 62% 18%, rgba(74,124,89,.08) 0%, transparent 70%);
  pointer-events:none;
}
.card{
  position:relative; z-index:1; width:min(420px,92vw);
  background:rgba(250,250,245,0.52);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.72); border-radius:24px;
  padding:44px 40px 40px;
  box-shadow:0 8px 32px rgba(28,28,28,.11), 0 1px 0 rgba(255,255,255,.9) inset;
  display:flex; flex-direction:column; gap:26px;
}
.logo-wrap{ display:flex; flex-direction:column; align-items:center; gap:10px; }
.logo-svg{ width:100%; max-width:310px; height:auto; overflow:visible; }

.st0{ fill:var(--nero); stroke:none; opacity:0; transition:opacity .35s ease, fill .45s ease; }

.logo-G.vis   .st0,
.logo-D.vis   .st0,
.logo-C.vis   .st0,
.logo-STUFF.vis .st0,
.logo-linee.vis .st0{ opacity:1; }

.logo-linee.c-life  .st0{ fill:var(--life);  }
.logo-linee.c-maker .st0{ fill:var(--maker); }

.tagline{ font-size:.7rem; font-weight:600; letter-spacing:.18em; text-transform:uppercase; color:var(--grigio); text-align:center; }
.divider{ height:1px; background:rgba(28,28,28,.10); }
.form{ display:flex; flex-direction:column; gap:14px; }
.field{ display:flex; flex-direction:column; gap:6px; }
.field label{ font-size:.72rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--grigio); }
.field input{
  font-family:'Jost',sans-serif; font-size:.95rem; font-weight:500;
  background:rgba(245,240,232,.75); border:2px solid var(--life);
  border-radius:10px; padding:12px 14px; outline:none; color:var(--nero);
  transition:border-color .25s, box-shadow .25s; width:100%;
}
.field input:focus{ border-color:var(--athlete); box-shadow:0 0 0 4px rgba(43,95,158,.12); }
.field input.filled{ border-color:var(--maker); }
.field input.filled:focus{ border-color:var(--athlete); }
.btn{
  font-family:'Jost',sans-serif; font-weight:700; font-size:1rem; letter-spacing:.04em;
  border:none; border-radius:12px; padding:14px; cursor:pointer; width:100%;
  transition:background .4s, box-shadow .3s, transform .1s;
  background:var(--life); color:var(--bianco);
  box-shadow:0 4px 16px rgba(196,30,90,.22); margin-top:4px;
}
.btn.ready{ background:var(--maker); box-shadow:0 4px 16px rgba(74,124,89,.26); }
.btn:active{ transform:scale(.98); }
.pwd-wrap{ position:relative; }
.pwd-wrap input{ padding-right:42px; }
.eye-btn{
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  background:none; border:none; cursor:pointer; color:var(--grigio);
  display:flex; align-items:center; padding:4px;
  transition:color .2s;
}
.eye-btn:hover{ color:var(--nero); }
.footer-row{
  display:flex; align-items:center; justify-content:space-between;
}
.footer{ font-size:.68rem; color:var(--grigio); letter-spacing:.04em; }
.replay-btn{
  font-family:'Jost',sans-serif; font-size:.68rem; font-weight:600;
  border:1px solid rgba(28,28,28,.14); border-radius:7px; padding:5px 9px;
  background:transparent; cursor:pointer; color:var(--grigio);
  transition:background .2s, color .2s; white-space:nowrap;
}
.replay-btn:hover{ background:rgba(28,28,28,.06); color:var(--nero); }
</style>
</head>

          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>
    <button class="btn" id="btn">Accedi</button>
  </div>
  <div class="footer-row">
    <p class="footer">GDC IA TEAM &nbsp;·&nbsp; uso privato</p>
    <button class="replay-btn" onclick="replayLogo()">↺ Replay logo</button>
  </div>
</div>
<script>
const svg   = document.getElementById('logoSvg');
const email = document.getElementById('email');
const pwd   = document.getElementById('password');
const btn   = document.getElementById('btn');

const G     = [...svg.querySelectorAll('.logo-G')];
const D     = [...svg.querySelectorAll('.logo-D')];
const C     = [...svg.querySelectorAll('.logo-C')];
const STUFF = [...svg.querySelectorAll('.logo-STUFF')];
const linee = [...svg.querySelectorAll('.logo-linee')];

function resetLogo(){
  [...G,...D,...C,...STUFF,...linee].forEach(el =>
    el.classList.remove('vis','c-life','c-maker')
  );
}

function showGroup(els, delay){
  setTimeout(() => {
    els.forEach((el, i) => setTimeout(() => el.classList.add('vis'), i * 15));
  }, delay);
}

function animateLogo(){
  resetLogo();
  showGroup(G,      80);
  showGroup(D,     420);
  showGroup(C,     760);
  showGroup(STUFF,1100);
  showGroup(linee,1440);
  setTimeout(() => {
    linee.forEach(el => el.classList.add('c-life'));
  }, 3300);
}

function updateForm(){
  const e = email.value.trim().length > 0;
  const p = pwd.value.trim().length > 0;
  email.classList.toggle('filled', e);
  pwd.classList.toggle('filled', p);
  btn.classList.toggle('ready', e && p);
  linee.forEach((el, idx) => {
    el.classList.remove('c-life','c-maker');
    if(e && p)              el.classList.add('c-maker');
    else if(e && idx === 0) el.classList.add('c-maker');
    else                    el.classList.add('c-life');
  });
}

email.addEventListener('input', updateForm);
pwd.addEventListener('input', updateForm);
function replayLogo(){ animateLogo(); }
animateLogo();

// ── EYE TOGGLE ──
const eyeBtn = document.getElementById('eyeBtn');
const eyeIcon = document.getElementById('eyeIcon');
eyeBtn.addEventListener('click', () => {
  const show = pwd.type === 'password';
  pwd.type = show ? 'text' : 'password';
  eyeIcon.innerHTML = show
    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
});

// ── AUTH ──
const SB_URL = 'https://pnzabwfsgkvejnrtrjcp.supabase.co';
const SB_KEY = 'sb_publishable_DCzX82HTZ1avt-NJxGAz4Q_6ZlxMudV';

btn.addEventListener('click', doLogin);
document.addEventListener('keydown', e => { if(e.key === 'Enter') doLogin(); });

async function doLogin() {
  const e = email.value.trim();
  const p = pwd.value.trim();
  if (!e || !p) return;
  btn.disabled = true;
  btn.textContent = 'Accesso...';
  try {
    const res = await fetch(SB_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY },
      body: JSON.stringify({ email: e, password: p })
    });
    const data = await res.json();
    if (data.access_token) {
      try {
        sessionStorage.setItem('gdc_token', data.access_token);
        sessionStorage.setItem('gdc_uid', data.user.id);
      } catch(err){}
      window.location.href = 'page_hub_v1.html';
    } else {
      showError('Email o password non corretti.');
      btn.disabled = false;
      btn.textContent = 'Accedi';
    }
  } catch(err) {
    showError('Errore di connessione.');
    btn.disabled = false;
    btn.textContent = 'Accedi';
  }
}

function showError(msg) {
  let el = document.getElementById('login-err');
  if (!el) {
    el = document.createElement('p');
    el.id = 'login-err';
    el.style.cssText = 'color:#C2193A;font-size:.75rem;text-align:center;margin-top:8px;font-family:Jost,sans-serif;';
    btn.parentNode.insertBefore(el, btn.nextSibling);
  }
  el.textContent = msg;
}
</script>
</body>
</html>
