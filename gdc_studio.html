body{background:#F7F8FA;font-family:system-ui,-apple-system,sans-serif;font-size:14px;min-height:100vh;}
input,textarea,button{font-family:inherit;}
.card{background:#fff;border-radius:12px;border:1px solid #E5E7EB;padding:11px;margin-bottom:8px;}
.lbl{font-size:10px;font-weight:700;color:#9CA3AF;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;}
.inp{width:100%;padding:9px 11px;border-radius:8px;border:1px solid #E5E7EB;font-size:13px;color:#111827;background:#fff;outline:none;box-sizing:border-box;}
.inp:focus{border-color:#111827;}
.btn{padding:11px 16px;border-radius:9px;border:none;font-weight:700;font-size:13px;cursor:pointer;width:100%;}
.btn-p{background:#111827;color:#fff;}
.btn-s{background:#F3F4F6;color:#111827;}
.btn-g{background:#16A34A;color:#fff;}
.btn-gh{background:transparent;color:#6B7280;border:1px solid #E5E7EB;}
.btn-o{background:#EA580C;color:#fff;}
.btn-sm{padding:7px 12px;font-size:12px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.ttl{font-size:16px;font-weight:800;color:#111827;letter-spacing:-.02em;margin-bottom:13px;}
.pill{padding:3px 9px;border-radius:20px;border:1.5px solid;font-size:10px;font-weight:700;cursor:pointer;background:transparent;display:inline-block;}
/* Nav */

.nav-inner{display:flex;justify-content:center;max-width:480px;margin:0 auto;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px 2px;}
.nb-icon{font-size:18px;}
.nb-lbl{font-size:8px;font-weight:500;color:#9CA3AF;}
.nb.on .nb-lbl{color:#111827;font-weight:800;}
.nb-dot{width:14px;height:2px;border-radius:1px;background:#111827;display:none;}
.nb.on .nb-dot{display:block;}
/* Topbar */
.topbar{padding:14px 14px 4px;background:#F7F8FA;position:sticky;top:0;z-index:10;}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;}
.logo-box{width:28px;height:28px;border-radius:7px;background:#111827;display:flex;align-items:center;justify-content:center;font-size:14px;}
.logo-name{font-size:14px;font-weight:800;color:#111827;letter-spacing:-.02em;}
.logo-sub{font-size:10px;color:#9CA3AF;}
.save-btn{padding:5px 14px;border-radius:20px;border:none;font-weight:700;font-size:11px;cursor:pointer;}
.hub-btn{padding:5px 12px;border-radius:20px;background:#F3F4F6;color:#6B7280;border:none;font-weight:700;font-size:11px;cursor:pointer;}
/* Content */
.content{padding:12px 14px 110px;}
/* Filament bar */
.fil-bar{height:3px;background:#E5E7EB;border-radius:2px;margin-bottom:4px;}
.fil-fill{height:100%;border-radius:2px;}
/* Sub tabs */
.subtabs{display:flex;gap:6px;margin-bottom:12px;}
.stab{flex:1;padding:7px;border-radius:8px;border:1.5px solid;font-weight:700;font-size:12px;cursor:pointer;}
/* Map */
#hw-map{position:relative;height:300px;background:#FAFAFA;border-radius:12px;border:1px solid #E5E7EB;overflow:hidden;margin-bottom:12px;user-select:none;}
.hw-item{position:absolute;z-index:20;background:#fff;border-radius:10px;padding:7px 9px;min-width:88px;max-width:115px;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:grab;touch-action:none;}
.hw-item:active{cursor:grabbing;}
.hw-center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:10;text-align:center;}
</style>

function setSaveStatus(s){

// ── SUPABASE ──
function sbH(auth){const h={'Content-Type':'application/json','apikey':SB_KEY};if(auth&&_token)h['Authorization']='Bearer '+_token;return h;}

async function sbGet(table){
  const r=await fetch(SB_URL+'/rest/v1/'+table+'?user_id=eq.'+_userId+'&select=*&order=id',{headers:sbH(true)});
  return r.json();
}
async function sbPatch(table,id,patch){
  patch.updated_at=new Date().toISOString();
  await fetch(SB_URL+'/rest/v1/'+table+'?id=eq.'+id+'&user_id=eq.'+_userId,{method:'PATCH',headers:{...sbH(true),'Prefer':'return=minimal'},body:JSON.stringify(toSnake(patch))});
}
async function sbInsert(table,row){
  const body={...toSnake(row),user_id:_userId,updated_at:new Date().toISOString()};
  await fetch(SB_URL+'/rest/v1/'+table,{method:'POST',headers:{...sbH(true),'Prefer':'return=minimal'},body:JSON.stringify(body)});
}
async function sbDelete(table,id){
  await fetch(SB_URL+'/rest/v1/'+table+'?id=eq.'+id+'&user_id=eq.'+_userId,{method:'DELETE',headers:sbH(true)});
}

function toSnake(o){
  const m={grammiResidui:'grammi_residui',grammiTotali:'grammi_totali',prezzoPagato:'prezzo_pagato',bobinaUsage:'bobina_usage'};
  const r={};Object.entries(o).forEach(([k,v])=>{r[m[k]||k]=v;});return r;
}
function fromSnake(o){
  return{id:o.id,colore:o.colore,tipo:o.tipo,grammiTotali:o.grammi_totali,grammiResidui:o.grammi_residui,prezzoPagato:o.prezzo_pagato,data:o.data,
    nome:o.nome,sottotitolo:o.sottotitolo,cliente:o.cliente,pezzi:o.pezzi,stato:o.stato,prezzo:o.prezzo,pagato:o.pagato,bobinaUsage:o.bobina_usage||[],
    descrizione:o.descrizione,importo:o.importo,categoria:o.categoria,note:o.note,x:o.x,y:o.y};
}

async function sbLoad(){
  try{
    const [f,o,e,p,h]=await Promise.all([sbGet('studio_filaments'),sbGet('studio_orders'),sbGet('studio_expenses'),sbGet('studio_projects'),sbGet('studio_hardware')]);
    filaments=Array.isArray(f)&&f.length?f.map(fromSnake):null;
    orders=Array.isArray(o)&&o.length?o.map(fromSnake):null;
    expenses=Array.isArray(e)&&e.length?e.map(fromSnake):null;
    projects=Array.isArray(p)&&p.length?p.map(x=>({...(x.data||{}),id:x.id})):[];
    hardware=Array.isArray(h)&&h.length?h.map(fromSnake):null;
    if(!filaments){filaments=SEED_F;await sbSeedTable('studio_filaments',SEED_F);}
    if(!orders){orders=SEED_O;await sbSeedTable('studio_orders',SEED_O);}
    if(!expenses){expenses=SEED_E;await sbSeedTable('studio_expenses',SEED_E);}
    if(!hardware){hardware=SEED_HW;await sbSeedTable('studio_hardware',SEED_HW);}
  }catch(e){filaments=SEED_F;orders=SEED_O;expenses=SEED_E;hardware=SEED_HW;projects=[];}
}

async function sbSeedTable(table,data){

}

// ── INIT ──
(async function init(){
  try{
    const t=sessionStorage.getItem('gdc_token'),u=sessionStorage.getItem('gdc_uid');
    if(t&&u){
      _token=t;_userId=u;
      const r=await fetch(SB_URL+'/auth/v1/user',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+t}});
      if(!r.ok)throw new Error('token expired');
      await sbLoad();
      switchTab('calc');
    }else{window.location.href='gdc_ia_team_dashboard.html';}
  }catch(e){window.location.href='gdc_ia_team_dashboard.html';}
})();

function switchTab(t){

  const btn=document.getElementById('nb-'+t);if(btn)btn.classList.add('on');
  render();
}

function render(){

  el.innerHTML='';
  ({calc:renderCalc,filament:renderFilaments,orders:renderOrders,finance:renderFinance,hardware:renderHardware,chat:renderChat})[curTab](el);
}

function el(tag,style,html){const d=document.createElement(tag);if(style)Object.assign(d.style,typeof style==='string'?{cssText:style}:style);if(html)d.innerHTML=html;return d;}
function btn(label,onclick,cls,sm){const b=document.createElement('button');b.className='btn btn-'+(cls||'p')+(sm?' btn-sm':'');b.textContent=label;b.onclick=onclick;return b;}
function inp(ph,val,oninput,type){const i=document.createElement('input');i.className='inp';i.placeholder=ph||'';i.value=val||'';i.type=type||'text';if(oninput)i.oninput=e=>oninput(e.target.value);return i;}
function g2(children){const d=document.createElement('div');d.className='g2';children.forEach(c=>{if(c)d.appendChild(c);});return d;}
function card(html,style){const d=document.createElement('div');d.className='card';if(style)Object.assign(d.style,style);if(html)d.innerHTML=html;return d;}
function lbl(txt){const d=document.createElement('div');d.className='lbl';d.textContent=txt;return d;}

function doCalc(){
  const f=calcFields;
  const allBobine=[...filaments.filter(b=>b.grammiResidui>0),...(f.tempBobine||[])];
  const pezzi=parseInt(f.qty)||1;
  let costoFil=0;(f.bobinaUsage||[]).forEach(bu=>{const bob=allBobine.find(b=>b.id===bu.id);const g=parseFloat(bu.grammi)||0;if(bob&&g>0)costoFil+=(g/bob.grammiTotali)*bob.prezzoPagato;});
  const costoEnergia=(parseFloat(f.kwh)||0)*(parseFloat(f.energyRate)||ENERGY_RATE);
  const pc={"Rimozione supporti":1.5,"Levigatura":3,"Colorazione base":4,"Colorazione avanzata":8,"Assemblaggio":5,"Finitura lucida":6,"Altro":3};
  const costoPost=(f.postProd||[]).reduce((a,p)=>a+(pc[p]||2),0);
  const sub=costoFil+costoEnergia+costoPost;
  const prezzoPezzo=sub*RISK_MULT[f.risk]*PERCEIVED_MULT[f.perceived];
  calcResult={costoFil,costoEnergia,costoPost,subtotalePezzo:sub,prezzoPezzo,prezzoConsigliato:prezzoPezzo*pezzi,pezzi};
  render();
}

function saveProjCalc(){
  const id=calcEditId||Date.now();
  const proj={id,fields:calcFields,result:calcResult,nome:calcFields.projectName||'Progetto senza nome',data:todayIT()};
  if(calcEditId)projects=projects.map(p=>p.id===id?proj:p);else projects=[proj,...projects];
  setSaveStatus('saving');
  sbInsert('studio_projects',{id,data:proj}).then(()=>setSaveStatus('saved'));

}

function sendToOrders(){
  if(!calcResult)return;
  const r=calcResult,f=calcFields;

    const hdr=document.createElement('div');hdr.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:12px';
    const bb=document.createElement('button');bb.textContent='←';bb.style.cssText='background:none;border:none;cursor:pointer;color:#6B7280;font-size:20px;padding:0';bb.onclick=()=>{finDetail=null;renderFinance(el);};hdr.appendChild(bb);const tt=document.createElement('div');tt.className='ttl';tt.style.marginBottom='0';tt.textContent=d.label;hdr.appendChild(tt);el.appendChild(hdr);
    el.innerHTML+='<div style="background:'+d.bg+';border-radius:11px;padding:12px;text-align:center;margin-bottom:12px"><div style="font-size:26px;font-weight:800;color:'+d.color+'">€'+d.val.toFixed(2)+'</div></div>';
    if(d.isSpese){const ab=btn('+ Aggiungi spesa',()=>showAddExpense(el,finDetail),'s',true);ab.style.marginBottom='8px';el.appendChild(ab);}
    if(!d.items.length){const e=document.createElement('div');e.style.cssText='text-align:center;color:#9CA3AF;font-size:13px;padding:24px 0';e.textContent='Nessuna voce';el.appendChild(e);}
    d.items.forEach(item=>{
      const val=parseFloat(item.prezzo||item.importo||0);
      const c=card();c.innerHTML='<div style="margin-bottom:6px"><div style="font-size:13px;font-weight:700">'+(item.descrizione||item.nome||'')+'</div><div style="font-size:11px;color:#6B7280">'+(item.sottotitolo||item.cliente||'')+'</div><div style="font-size:11px;color:#9CA3AF">'+(item.data||'')+'</div></div>';
      const bot=document.createElement('div');bot.style.cssText='border-top:1px solid #E5E7EB;padding-top:6px;display:flex;justify-content:space-between;align-items:center';bot.innerHTML='<div style="font-weight:800;font-size:15px;color:'+d.color+'">€'+val.toFixed(2)+'</div>';
      if(d.isSpese){const db=document.createElement('button');db.textContent='✕';db.style.cssText='background:none;border:none;color:#9CA3AF;cursor:pointer;font-size:13px';db.onclick=()=>{expenses=expenses.filter(e=>e.id!==item.id);sbDelete('studio_expenses',item.id);renderFinance(el);};bot.appendChild(db);}
      c.appendChild(bot);el.appendChild(c);
    });
    return;
  }
  el.innerHTML+='<div class="lbl">Entrate</div>';
  const g1=document.createElement('div');g1.className='g2';g1.style.marginBottom='10px';
  SECS.slice(0,3).forEach(s=>{const d=document.createElement('div');d.style.cssText='background:'+s.bg+';border-radius:11px;padding:10px;text-align:center;cursor:pointer;border:1px solid '+s.color+'22';d.innerHTML='<div style="font-size:9px;font-weight:700;color:'+s.color+';letter-spacing:.05em;text-transform:uppercase;margin-bottom:2px">'+s.label+'</div><div style="font-size:17px;font-weight:800;color:'+s.color+'">€'+s.val.toFixed(2)+'</div>';d.onclick=()=>{finDetail=s.id;renderFinance(el);};g1.appendChild(d);});
  el.appendChild(g1);
  el.innerHTML+='<div class="lbl">Spese</div>';
  const g2d=document.createElement('div');g2d.className='g2';g2d.style.marginBottom='10px';
  SECS.slice(3).forEach(s=>{const d=document.createElement('div');d.style.cssText='background:'+s.bg+';border-radius:11px;padding:10px;text-align:center;cursor:pointer;border:1px solid '+s.color+'22';d.innerHTML='<div style="font-size:9px;font-weight:700;color:'+s.color+';letter-spacing:.05em;text-transform:uppercase;margin-bottom:2px">'+s.label+'</div><div style="font-size:17px;font-weight:800;color:'+s.color+'">€'+s.val.toFixed(2)+'</div>';d.onclick=()=>{finDetail=s.id;renderFinance(el);};g2d.appendChild(d);});
  el.appendChild(g2d);
  el.appendChild(card('<div style="text-align:center"><div style="font-size:9px;font-weight:700;color:'+(bil>=0?'#16A34A':'#DC2626')+';letter-spacing:.05em;text-transform:uppercase;margin-bottom:3px">Bilancio Netto</div><div style="font-size:26px;font-weight:800;color:'+(bil>=0?'#16A34A':'#DC2626')+'">'+(bil>=0?'':'-')+'€'+Math.abs(bil).toFixed(2)+'</div></div>',{background:bil>=0?'#F0FDF4':'#FEF2F2',border:'1px solid '+(bil>=0?'#16A34A':'#DC2626')+'33'}));
}

function showAddExpense(el,cat){
  const form={descrizione:'',sottotitolo:'',importo:'',categoria:cat,data:''};
  const c=card();c.appendChild(lbl('Nuova spesa'));
  [['Titolo spesa','descrizione'],['Sottotitolo','sottotitolo']].forEach(([ph,k])=>{const i=inp(ph,'',v=>form[k]=v);i.style.marginBottom='7px';c.appendChild(i);});
  const g=g2([inp('Importo €','',v=>form.importo=v,'number'),inp('Data','',v=>form.data=v)]);g.style.marginBottom='7px';c.appendChild(g);
  c.appendChild(g2([btn('Salva',()=>{if(!form.descrizione)return;const e={id:Date.now(),...form};expenses=[...expenses,e];setSaveStatus('saving');sbInsert('studio_expenses',e).then(()=>setSaveStatus('saved'));renderFinance(document.getElementById('content'));},'g',true),btn('Annulla',()=>renderFinance(document.getElementById('content')),'gh',true)]));
  el.prepend(c);
}

// ── HARDWARE ──
function renderHardware(el){
  el.innerHTML='<div class="ttl">⚙️ Macchinario</div>';
  const mapDiv=document.createElement('div');mapDiv.id='hw-map';
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');svg.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none';
  const stampante=hardware.find(h=>h.tipo==='stampante');
  const resto=hardware.filter(h=>h.tipo!=='stampante');
  resto.forEach(h=>{const line=document.createElementNS('http://www.w3.org/2000/svg','line');line.setAttribute('x1','50%');line.setAttribute('y1','50%');line.setAttribute('x2','calc(50% + '+h.x+'px)');line.setAttribute('y2','calc(50% + '+h.y+'px)');line.setAttribute('stroke','#E5E7EB');line.setAttribute('stroke-width','1.5');line.setAttribute('stroke-dasharray','4,3');svg.appendChild(line);});
  mapDiv.appendChild(svg);
  if(stampante){const d=document.createElement('div');d.className='hw-center';d.innerHTML='<div style="background:#111827;border-radius:14px;padding:10px 16px;display:inline-block;box-shadow:0 4px 12px rgba(0,0,0,.15)"><div style="font-size:22px">🖨️</div><div style="font-size:11px;font-weight:800;color:#fff;margin-top:2px">'+stampante.nome+'</div></div>';mapDiv.appendChild(d);}
  resto.forEach(h=>{
    const st=STATI_HW[h.stato]||STATI_HW.ok;
    const d=document.createElement('div');d.className='hw-item';d.style.cssText='left:calc(50% + '+h.x+'px);top:calc(50% + '+h.y+'px);transform:translate(-50%,-50%);border:1.5px solid '+st.color+'66';
    d.innerHTML='<div style="display:flex;justify-content:space-between;gap:3px"><span style="font-size:13px">'+(TIPI[h.tipo]||'📦')+'</span><button onclick="delHW('+h.id+')" style="background:none;border:none;color:#9CA3AF;cursor:pointer;font-size:10px;padding:0">✕</button></div><div style="font-size:10px;font-weight:700;margin-top:2px">'+h.nome+'</div>'+(h.note?'<div style="font-size:9px;color:#9CA3AF">'+h.note+'</div>':'')+
      '<div style="margin-top:4px;display:flex;gap:3px;flex-wrap:wrap">'+Object.entries(STATI_HW).map(([s,cfg])=>'<span onclick="updHW('+h.id+',\'stato\',\''+s+'\')" style="padding:2px 6px;border-radius:10px;border:1.5px solid '+(h.stato===s?cfg.color:'#E5E7EB')+';background:'+(h.stato===s?cfg.color+'22':'transparent')+';color:'+(h.stato===s?cfg.color:'#9CA3AF')+';font-size:9px;font-weight:700;cursor:pointer">'+cfg.label+'</span>').join('')+'</div>';
    // Drag
    let dragging=false,ox=0,oy=0;
    d.onmousedown=e=>{e.preventDefault();const map=document.getElementById('hw-map');if(!map)return;const r=map.getBoundingClientRect();dragging=true;ox=e.clientX-(r.left+r.width/2)-h.x;oy=e.clientY-(r.top+r.height/2)-h.y;d.style.cursor='grabbing';};
    document.addEventListener('mousemove',e=>{if(!dragging)return;const map=document.getElementById('hw-map');if(!map)return;const r=map.getBoundingClientRect();const nx=Math.round(e.clientX-(r.left+r.width/2)-ox),ny=Math.round(e.clientY-(r.top+r.height/2)-oy);d.style.left='calc(50% + '+nx+'px)';d.style.top='calc(50% + '+ny+'px)';h.x=nx;h.y=ny;});
    document.addEventListener('mouseup',()=>{if(dragging){dragging=false;d.style.cursor='grab';updHW(h.id,'x',h.x);updHW(h.id,'y',h.y);}});
    // Touch
    d.ontouchstart=e=>{const touch=e.touches[0];const map=document.getElementById('hw-map');if(!map)return;const r=map.getBoundingClientRect();ox=touch.clientX-(r.left+r.width/2)-h.x;oy=touch.clientY-(r.top+r.height/2)-h.y;dragging=true;};
    d.ontouchmove=e=>{if(!dragging)return;e.preventDefault();const touch=e.touches[0];const map=document.getElementById('hw-map');if(!map)return;const r=map.getBoundingClientRect();const nx=Math.round(touch.clientX-(r.left+r.width/2)-ox),ny=Math.round(touch.clientY-(r.top+r.height/2)-oy);d.style.left='calc(50% + '+nx+'px)';d.style.top='calc(50% + '+ny+'px)';h.x=nx;h.y=ny;};
    d.ontouchend=()=>{if(dragging){dragging=false;updHW(h.id,'x',h.x);updHW(h.id,'y',h.y);}};
    mapDiv.appendChild(d);
  });
  const hint=document.createElement('div');hint.style.cssText='position:absolute;bottom:8px;right:10px;font-size:9px;color:#9CA3AF';hint.textContent='trascina per spostare';mapDiv.appendChild(hint);
  el.appendChild(mapDiv);
  el.appendChild(btn('+ Aggiungi componente',()=>showAddHW(el),'s'));
}

function updHW(id,k,v){hardware=hardware.map(h=>h.id===id?{...h,[k]:v}:h);setSaveStatus('saving');sbPatch('studio_hardware',id,{[k]:v}).then(()=>setSaveStatus('saved'));}
function delHW(id){hardware=hardware.filter(h=>h.id!==id);sbDelete('studio_hardware',id);renderHardware(document.getElementById('content'));}
function showAddHW(el){
  const form={nome:'',tipo:'accessorio',stato:'ok',note:'',data:''};
  const c=card();c.appendChild(lbl('Nuovo componente'));
  const ni=inp('Nome','',v=>form.nome=v);ni.style.marginBottom='7px';c.appendChild(ni);
  const tipiDiv=document.createElement('div');tipiDiv.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:7px';
  Object.entries(TIPI).forEach(([k,v])=>{const b=document.createElement('button');b.className='stab';b.style.cssText='padding:6px 2px;font-size:9px;font-weight:700;border-color:'+(form.tipo===k?'#111827':'#E5E7EB')+';background:'+(form.tipo===k?'#F3F4F6':'#fff');b.innerHTML=v+'<br>'+k;b.onclick=e=>{e.preventDefault();form.tipo=k;showAddHW(el);};tipiDiv.appendChild(b);});
  c.appendChild(tipiDiv);
  const ni2=inp('Note','',v=>form.note=v);ni2.style.marginBottom='7px';c.appendChild(ni2);
  const ni3=inp('Data','',v=>form.data=v);ni3.style.marginBottom='7px';c.appendChild(ni3);
  c.appendChild(g2([btn('Aggiungi',()=>{if(!form.nome)return;const angle=Math.random()*Math.PI*2,dist=120+Math.random()*30;const hw={id:Date.now(),...form,data:form.data||todayIT(),x:Math.round(Math.cos(angle)*dist),y:Math.round(Math.sin(angle)*dist)};hardware=[...hardware,hw];setSaveStatus('saving');sbInsert('studio_hardware',hw).then(()=>setSaveStatus('saved'));renderHardware(document.getElementById('content'));},'g',true),btn('Annulla',()=>renderHardware(document.getElementById('content')),'gh',true)]));
  el.prepend(c);
}

// ── CHAT ──
function renderChat(el){
  el.style.cssText='display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;text-align:center';
  el.innerHTML='<div style="font-size:40px;margin-bottom:16px">💬</div><div style="font-size:16px;font-weight:700;margin-bottom:8px">Chat AI</div><div style="font-size:13px;color:#9CA3AF;line-height:1.7;max-width:300px">Assistente AI per aggiornare magazzino, ordini e spese.<br><br>In costruzione — disponibile presto.</div>';
}
</script>
</body>
