<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GDC Print Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --carta:#F5F0E8; --bianco:#FAFAF5; --nero:#1C1C1C;
  --grigio:#6B6B6B; --grigio-lt:#9A9488; --bordo:#DDD6CB;
  --maker:#4A7C59; --maker-bg:#C7DFCF; --maker-dk:#3A6145;
  --life:#C41E5A; --life-bg:#F5E0E6;
  --sabbia:#C4A865; --sab-bg:#E9DFC9; --sabbia-dk:#8A6D3B; --sabbia-txt:#7A5C20;
  --athlete:#2B5F9E; --ath-bg:#D9E6F3;
  --viola:#7D6B9E; --viola-bg:#EAE3F2;
}
@media(prefers-color-scheme:dark){
  :root{--carta:#1A1A1A; --bianco:#242424; --nero:#F0EBE1; --bordo:#3A3A3A; --grigio:#9A9A9A; --grigio-lt:#7A7A7A;}
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--carta);font-family:'Jost',sans-serif;font-size:14px;min-height:100vh;color:var(--nero);}
input,textarea,button{font-family:inherit;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;background:var(--bianco);border-bottom:1.5px solid var(--bordo);position:sticky;top:0;z-index:100;gap:12px;}
@media(max-width:768px){
  .topbar{padding:8px 12px;height:48px;}
  #desktop-nav{display:none!important;}
  #mobile-nav-bar{display:block!important;position:sticky;top:48px;z-index:99;}
  #mobile-tabs .ntab{flex:1;font-size:11px;padding:8px 4px;white-space:nowrap;border-radius:0;border:none;border-bottom:2px solid transparent;justify-content:center;flex-direction:column;gap:2px;}
  #mobile-tabs .ntab.on{background:var(--carta);border-bottom:2px solid var(--sabbia);color:var(--nero);}
  #mobile-tabs .ntab-icon{font-size:16px;}
  .content{padding:12px;}
}
@media(min-width:769px){
  #mobile-nav-bar{display:none!important;}
}
.logo-row{display:flex;align-items:center;gap:9px;flex-shrink:0;}
.gdc-logo-wrap{display:flex;align-items:center;}

/* NAV TABS - horizontal top */
.nav-tabs{display:flex;gap:2px;flex:1;justify-content:center;}
.ntab{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:9px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:600;color:var(--grigio);transition:all .12s;white-space:nowrap;font-family:'Jost',sans-serif;}
.ntab:hover{background:var(--carta);color:var(--nero);}
.ntab.on{background:var(--sabbia);color:var(--nero);}
.ntab-icon{font-size:14px;}

.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.save-btn{padding:5px 14px;border-radius:20px;border:none;font-weight:700;font-size:11px;cursor:pointer;transition:background .3s;font-family:'Jost',sans-serif;}
.hub-btn{padding:5px 12px;border-radius:20px;background:var(--carta);color:var(--grigio);border:1.5px solid var(--bordo);font-weight:700;font-size:11px;cursor:pointer;font-family:'Jost',sans-serif;}
.hub-btn:hover{background:var(--bordo);color:var(--nero);}

/* CONTENT */
.content{padding:20px;max-width:1200px;margin:0 auto;}

/* CARDS */
.card{background:var(--bianco);border-radius:14px;border:1.5px solid var(--bordo);padding:14px;margin-bottom:10px;}
.lbl{font-size:10px;font-weight:700;color:var(--grigio-lt);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.inp{width:100%;padding:9px 11px;border-radius:9px;border:1.5px solid var(--bordo);font-size:13px;color:var(--nero);background:var(--bianco);outline:none;box-sizing:border-box;font-family:'Jost',sans-serif;transition:border-color .15s;}
.inp:focus{border-color:var(--sabbia);}
.btn{padding:10px 16px;border-radius:10px;border:none;font-weight:700;font-size:13px;cursor:pointer;width:100%;font-family:'Jost',sans-serif;transition:background .15s,transform .1s;}
.btn:active{transform:scale(.98);}
.btn-p{background:var(--sabbia);color:var(--nero);}
.btn-p:hover{background:#B89855;}
.btn-s{background:var(--carta);color:var(--nero);border:1.5px solid var(--bordo);}
.btn-s:hover{background:var(--bordo);}
.btn-g{background:var(--maker);color:#fff;}
.btn-g:hover{background:var(--maker-dk);}
.btn-gh{background:transparent;color:var(--grigio);border:1.5px solid var(--bordo);}
.btn-gh:hover{background:var(--carta);border-color:var(--grigio);}
.btn-o{background:var(--life);color:#fff;}
.btn-sm{padding:7px 12px;font-size:12px;}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}

/* PAGE LAYOUT */
.page-2col{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;}
.page-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;align-items:start;}

.ttl{font-size:18px;font-weight:800;color:var(--nero);letter-spacing:-.02em;margin-bottom:16px;}
.pill{padding:3px 9px;border-radius:20px;border:1.5px solid;font-size:10px;font-weight:700;cursor:pointer;background:transparent;display:inline-block;font-family:'Jost',sans-serif;}
.subtabs{display:flex;gap:6px;margin-bottom:14px;}
.stab{flex:1;padding:7px;border-radius:9px;border:1.5px solid;font-weight:700;font-size:12px;cursor:pointer;background:var(--bianco);transition:all .1s;font-family:'Jost',sans-serif;}

/* FILAMENT BAR */
.fil-bar{height:4px;background:var(--bordo);border-radius:2px;margin-bottom:4px;}
.fil-fill{height:100%;border-radius:2px;}

/* HARDWARE MAP */
#hw-map{position:relative;height:520px;background:var(--carta);border-radius:14px;border:1.5px solid var(--bordo);overflow:hidden;margin-bottom:12px;user-select:none;touch-action:none;}
@media(min-width:1200px){#hw-map{height:600px;}}
@media(max-width:768px){#hw-map{height:380px;}}
.hw-center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:10;text-align:center;}
.hw-item{position:absolute;z-index:20;background:var(--bianco);border-radius:12px;padding:8px 10px;min-width:100px;max-width:130px;box-shadow:0 2px 8px rgba(28,28,28,.08);cursor:grab;touch-action:none;}
.hw-item:active{cursor:grabbing;}

/* STATS BAR */
.stat-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.stat-box{background:var(--bianco);border-radius:12px;border:1.5px solid var(--bordo);padding:12px 14px;}
.stat-n{font-size:22px;font-weight:300;letter-spacing:-.02em;}
.stat-l{font-size:10px;color:var(--grigio-lt);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}

/* ORDER CARD */
.order-card{background:var(--bianco);border-radius:12px;border:1.5px solid var(--bordo);padding:12px;margin-bottom:8px;}

/* RESPONSIVE */
@media(max-width:900px){
  .page-2col,.page-3col{grid-template-columns:1fr;}
  .g4{grid-template-columns:1fr 1fr;}
  .nav-tabs{gap:0;}
  .ntab{padding:5px 8px;font-size:12px;}
  .ntab-icon{display:none;}
  .stat-bar{grid-template-columns:1fr 1fr;}
}
@media(max-width:600px){
  .topbar{padding:0 12px;}
  .nav-tabs{justify-content:flex-start;overflow-x:auto;}
  .ntab{font-size:11px;padding:5px 7px;}
  .content{padding:12px;}
  .g2,.g3{grid-template-columns:1fr;}
}
</style>
</head>

async function confirmReset(){
  if(!confirm('Cancella tutti i dati e reinserisce i dati originali?\nQuesta azione non si può annullare.'))return;
  setSS('saving');
  try{
    // Delete all existing data
    await Promise.all([
      sbFetch(SB_URL+'/rest/v1/studio_filaments?user_id=eq.'+_userId,{method:'DELETE',headers:sbH()}),
      sbFetch(SB_URL+'/rest/v1/studio_orders?user_id=eq.'+_userId,{method:'DELETE',headers:sbH()}),
      sbFetch(SB_URL+'/rest/v1/studio_expenses?user_id=eq.'+_userId,{method:'DELETE',headers:sbH()}),
      sbFetch(SB_URL+'/rest/v1/studio_hardware?user_id=eq.'+_userId,{method:'DELETE',headers:sbH()}),
      sbFetch(SB_URL+'/rest/v1/studio_projects?user_id=eq.'+_userId,{method:'DELETE',headers:sbH()})
    ]);
    // Re-seed with upsert
    await Promise.all([
      sbPost('studio_filaments',SEED_F,true),
      sbPost('studio_orders',SEED_O,true),
      sbPost('studio_expenses',SEED_E,true),
      sbPost('studio_hardware',SEED_HW,true)
    ]);
    filaments=SEED_F;orders=SEED_O;expenses=SEED_E;hardware=SEED_HW;projects=[];
    setSS('saved');
    switchTab('hardware');
    alert('Dati reinseriti correttamente!');
  }catch(e){console.error(e);setSS('saved');alert('Errore: '+e.message);}
}

/* ── SESSIONE SCADUTA ──
   Tutte le chiamate a Supabase passano da sbFetch(): se la risposta è 401/403
   (token scaduto o non valido), mostra un banner e reindirizza al login invece
   di lasciare che l'app mostri silenziosamente i dati seed come se i dati
   salvati non esistessero. */
let _sessionExpiredHandled=false;
function gdcSessionExpired(){
  if(_sessionExpiredHandled)return;
  _sessionExpiredHandled=true;
  sessionStorage.removeItem('gdc_token');
  sessionStorage.removeItem('gdc_uid');
  let banner=document.getElementById('gdcSessionBanner');
  if(!banner){
    banner=document.createElement('div');
    banner.id='gdcSessionBanner';

async function sbFetch(url,options){
  const res=await fetch(url,options);
  if(res.status===401||res.status===403){ gdcSessionExpired(); throw new Error('session-expired'); }
  return res;
}

async function sbGet(tbl){
  const r=await sbFetch(SB_URL+'/rest/v1/'+tbl+'?user_id=eq.'+_userId+'&select=*&order=id',{headers:sbH()});
  const d=await r.json();return Array.isArray(d)?d:[];
}
async function sbPatch(tbl,id,patch){
  const body=toSnake({...patch,updated_at:new Date().toISOString()});
  await sbFetch(SB_URL+'/rest/v1/'+tbl+'?id=eq.'+id+'&user_id=eq.'+_userId,{method:'PATCH',headers:{...sbH(),'Prefer':'return=minimal'},body:JSON.stringify(body)});
}
async function sbPost(tbl,rows,upsert){
  const isArr=Array.isArray(rows);
  const data=isArr?rows.map(r=>({...toSnake(r),user_id:_userId,updated_at:new Date().toISOString()})):{...toSnake(rows),user_id:_userId,updated_at:new Date().toISOString()};
  const prefer=upsert?'resolution=merge-duplicates,return=minimal':'return=minimal';
  const r=await sbFetch(SB_URL+'/rest/v1/'+tbl,{method:'POST',headers:{...sbH(),'Prefer':prefer},body:JSON.stringify(data)});
  if(!r.ok){const err=await r.text();console.error('sbPost error',tbl,r.status,err);throw new Error(err);}
}
async function sbDel(tbl,id){
  await sbFetch(SB_URL+'/rest/v1/'+tbl+'?id=eq.'+id+'&user_id=eq.'+_userId,{method:'DELETE',headers:sbH()});
}

function toSnake(o){
  const m={grammiResidui:'grammi_residui',grammiTotali:'grammi_totali',prezzoPagato:'prezzo_pagato',bobinaUsage:'bobina_usage'};
  const r={};Object.entries(o).forEach(([k,v])=>{r[m[k]||k]=v;});return r;
}
function fromRow(r){
  return{id:r.id,colore:r.colore,tipo:r.tipo,grammiTotali:r.grammi_totali,grammiResidui:r.grammi_residui,prezzoPagato:r.prezzo_pagato,data:r.data,
    nome:r.nome,sottotitolo:r.sottotitolo,cliente:r.cliente,pezzi:r.pezzi,stato:r.stato,prezzo:r.prezzo,pagato:r.pagato,bobinaUsage:r.bobina_usage||[],
    descrizione:r.descrizione,importo:r.importo,categoria:r.categoria,note:r.note,x:r.x,y:r.y};
}

async function loadData(){
  try{
    const [f,o,e,p,h]=await Promise.all([
      sbGet('studio_filaments'),sbGet('studio_orders'),
      sbGet('studio_expenses'),sbGet('studio_projects'),sbGet('studio_hardware')
    ]);
    // NEVER auto-seed — only load what's in DB or use in-memory fallback
    filaments = f.length ? f.map(fromRow) : SEED_F;
    orders    = o.length ? o.map(fromRow) : SEED_O;
    expenses  = e.length ? e.map(fromRow) : SEED_E;
    hardware  = h.length ? h.map(fromRow) : SEED_HW;
    projects  = p.length ? p.map(r=>({...(r.data||{}),id:r.id})) : [];
  }catch(err){
    console.error('Load error',err);
    if(err.message==='session-expired')return; // già in corso redirect al login, non sovrascrivere con i seed
    filaments=SEED_F;orders=SEED_O;expenses=SEED_E;hardware=SEED_HW;projects=[];
  }
}

function doCalc(){
  const f=calcFields;
  const allBobine=[...filaments.filter(b=>b.grammiResidui>0),...(f.tempBobine||[])];
  const pezzi=parseInt(f.qty)||1;
  let costoFil=0;(f.bobinaUsage||[]).forEach(bu=>{const bob=allBobine.find(b=>b.id===bu.id);const g=parseFloat(bu.grammi)||0;if(bob&&g>0)costoFil+=(g/bob.grammiTotali)*bob.prezzoPagato;});
  const costoEnergia=(parseFloat(f.kwh)||0)*(parseFloat(f.energyRate)||ER);
  const pc={"Rimozione supporti":1.5,"Levigatura":3,"Colorazione base":4,"Colorazione avanzata":8,"Assemblaggio":5,"Finitura lucida":6,"Altro":3};
  const costoPost=(f.postProd||[]).reduce((a,p)=>a+(pc[p]||2),0);
  const sub=costoFil+costoEnergia+costoPost;
  const prezzoPezzo=sub*RM[f.risk]*PM[f.perceived];
  calcResult={costoFil,costoEnergia,costoPost,prezzoPezzo,prezzoConsigliato:prezzoPezzo*pezzi,pezzi};
  render();
}

function saveProjCalc(){
  const id=calcEditId||Date.now();
  const proj={id,fields:{...calcFields},result:calcResult,nome:calcFields.projectName||'Progetto senza nome',data:todayIT()};
  if(calcEditId)projects=projects.map(p=>p.id===id?proj:p);else projects=[proj,...projects];
  setSS('saving');sbPost('studio_projects',{id,data:proj}).then(()=>setSS('saved')).catch(()=>setSS('saved'));
  calcView='list';render();
}
function sendToOrders(){
  if(!calcResult)return;
  const o={id:Date.now(),nome:calcFields.projectName||'Stampa senza nome',sottotitolo:'',cliente:'',pezzi:calcFields.qty,stato:'lavorazione',prezzo:calcResult.prezzoConsigliato.toFixed(2),pagato:false,data:todayIT(),bobinaUsage:calcFields.bobinaUsage||[]};
  orders=[o,...orders];
  setSS('saving');sbPost('studio_orders',o).then(()=>setSS('saved')).catch(()=>setSS('saved'));
  if(calcEditId){projects=projects.filter(p=>p.id!==calcEditId);sbDel('studio_projects',calcEditId);}
  calcView='list';render();
}

    const d=mk('div','hw-item');d.style.cssText='left:calc(50% + '+h.x+'px);top:calc(50% + '+h.y+'px);transform:translate(-50%,-50%);border:1.5px solid '+st.color+'66';
    d.innerHTML='<div style="display:flex;justify-content:space-between;gap:3px"><span style="font-size:15px">'+(TIPI[h.tipo]||'📦')+'</span><button onclick="delHW('+h.id+')" style="background:none;border:none;color:var(--grigio-lt);cursor:pointer;font-size:11px;padding:0">✕</button></div><div style="font-size:11px;font-weight:700;margin-top:3px">'+h.nome+'</div>'+(h.note?'<div style="font-size:10px;color:var(--grigio-lt)">'+h.note+'</div>':'')+
      '<div style="margin-top:5px;display:flex;gap:3px;flex-wrap:wrap">'+Object.entries(SHW).map(([s,cfg])=>'<span onclick="updHW('+h.id+',\'stato\',\''+s+'\')" style="padding:2px 6px;border-radius:10px;border:1.5px solid '+(h.stato===s?cfg.color:'var(--bordo)')+';background:'+(h.stato===s?cfg.color+'22':'transparent')+';color:'+(h.stato===s?cfg.color:'var(--grigio-lt)')+';font-size:9px;font-weight:700;cursor:pointer">'+cfg.label+'</span>').join('')+'</div>';
    let dragging=false,ox=0,oy=0;
    d.onmousedown=e=>{if(e.target.tagName==='BUTTON'||e.target.tagName==='SPAN')return;e.preventDefault();const map=document.getElementById('hw-map');if(!map)return;const r=map.getBoundingClientRect();dragging=true;ox=e.clientX-(r.left+r.width/2)-h.x;oy=e.clientY-(r.top+r.height/2)-h.y;d.style.cursor='grabbing';};
    document.addEventListener('mousemove',e=>{if(!dragging)return;const map=document.getElementById('hw-map');if(!map)return;const r=map.getBoundingClientRect();const nx=Math.round(e.clientX-(r.left+r.width/2)-ox),ny=Math.round(e.clientY-(r.top+r.height/2)-oy);d.style.left='calc(50% + '+nx+'px)';d.style.top='calc(50% + '+ny+'px)';h.x=nx;h.y=ny;updateSvgLines();});
    document.addEventListener('mouseup',()=>{if(dragging){dragging=false;d.style.cursor='grab';updHW(h.id,'x',h.x);updHW(h.id,'y',h.y);}});
    // Touch support
    d.addEventListener('touchstart',function(e){
      if(e.target.tagName==='BUTTON'||e.target.tagName==='SPAN')return;
      e.preventDefault();
      const touch=e.touches[0];
      const map=document.getElementById('hw-map');if(!map)return;
      const r=map.getBoundingClientRect();
      ox=touch.clientX-(r.left+r.width/2)-h.x;
      oy=touch.clientY-(r.top+r.height/2)-h.y;
      dragging=true;
    },{passive:false});
    d.addEventListener('touchmove',function(e){
      if(!dragging)return;
      e.preventDefault();
      const touch=e.touches[0];
      const map=document.getElementById('hw-map');if(!map)return;
      const r=map.getBoundingClientRect();
      const nx=Math.round(touch.clientX-(r.left+r.width/2)-ox);
      const ny=Math.round(touch.clientY-(r.top+r.height/2)-oy);
      d.style.left='calc(50% + '+nx+'px)';
      d.style.top='calc(50% + '+ny+'px)';
      h.x=nx;h.y=ny;
      updateSvgLines();
    },{passive:false});
    d.addEventListener('touchend',function(){
      if(dragging){dragging=false;updHW(h.id,'x',h.x);updHW(h.id,'y',h.y);}
    });
    mapDiv.appendChild(d);
  });
  const hint=mk('div','');hint.style.cssText='position:absolute;bottom:8px;right:10px;font-size:10px;color:var(--grigio-lt)';hint.textContent='trascina per spostare';mapDiv.appendChild(hint);
  left.appendChild(mapDiv);left.appendChild(btn('+ Aggiungi componente',()=>showAddHW(el),'s'));
  layout.appendChild(left);

  // Right: list
  const right=mk('div','');
  right.innerHTML='<div style="font-size:14px;font-weight:700;margin-bottom:12px">Componenti</div>';
  hardware.forEach(h=>{
    const st=SHW[h.stato]||SHW.ok;
    const c=card();c.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:10px 12px';
    c.innerHTML='<div><div style="font-size:14px">'+(TIPI[h.tipo]||'📦')+' <strong>'+h.nome+'</strong></div><div style="font-size:11px;color:var(--grigio-lt);margin-top:2px">'+h.tipo+' · '+h.data+'</div>'+(h.note?'<div style="font-size:11px;color:var(--grigio)">'+h.note+'</div>':'')+'</div>';
    const r=mk('div','');r.style.cssText='display:flex;align-items:center;gap:8px';r.innerHTML='<span style="padding:3px 10px;border-radius:20px;background:'+st.color+'22;color:'+st.color+';font-size:11px;font-weight:700;border:1px solid '+st.color+'44">'+st.label+'</span>';
    if(h.tipo!=='stampante'){const db=mk('button','');db.textContent='✕';db.style.cssText='background:none;border:none;color:var(--grigio-lt);cursor:pointer;font-size:14px';db.onclick=()=>delHW(h.id);r.appendChild(db);}
    c.appendChild(r);right.appendChild(c);
  });
  layout.appendChild(right);el.appendChild(layout);
}

function updHW(id,k,v){hardware=hardware.map(h=>h.id===id?{...h,[k]:v}:h);setSS('saving');sbPatch('studio_hardware',id,{[k]:v}).then(()=>setSS('saved')).catch(()=>setSS('saved'));}
function delHW(id){hardware=hardware.filter(h=>h.id!==id);sbDel('studio_hardware',id);renderHardware(document.getElementById('content'));}
function showAddHW(el){
  const form={nome:'',tipo:'accessorio',stato:'ok',note:'',data:''};
  const c=card();c.appendChild(lbl('Nuovo componente'));
  const ni=inp('Nome','',v=>form.nome=v);ni.style.marginBottom='8px';c.appendChild(ni);
  const tipiDiv=mk('div','g4');tipiDiv.style.marginBottom='8px';
  Object.entries(TIPI).forEach(([k,v])=>{const b=mk('button','stab');b.style.cssText='padding:8px 4px;font-size:10px;font-weight:700;border-color:'+(form.tipo===k?'#C4A865':'#DDD6CB')+';background:'+(form.tipo===k?'#E9DFC9':'#FAFAF5');b.innerHTML=v+'<br>'+k;b.onclick=e=>{e.preventDefault();form.tipo=k;showAddHW(el);};tipiDiv.appendChild(b);});
  c.appendChild(tipiDiv);
  const ni2=inp('Note (opz.)','',v=>form.note=v);ni2.style.marginBottom='8px';c.appendChild(ni2);
  const ni3=inp('Data acquisto','',v=>form.data=v);ni3.style.marginBottom='8px';c.appendChild(ni3);
  c.appendChild(g2([btn('Aggiungi',()=>{if(!form.nome)return;const angle=Math.random()*Math.PI*2,dist=140+Math.random()*30;const hw={id:Date.now(),...form,data:form.data||todayIT(),x:Math.round(Math.cos(angle)*dist),y:Math.round(Math.sin(angle)*dist)};hardware=[...hardware,hw];setSS('saving');sbPost('studio_hardware',hw).then(()=>setSS('saved')).catch(()=>setSS('saved'));renderHardware(document.getElementById('content'));},'g',true),btn('Annulla',()=>renderHardware(document.getElementById('content')),'gh',true)]));
  el.prepend(c);
}

// ── CHAT ──
function renderChat(el){
  el.removeAttribute('style');
  const d=mk('div','');
  d.style.cssText='display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:40px 20px';
  d.innerHTML='<div style="font-size:52px;margin-bottom:18px">💬</div><div style="font-size:20px;font-weight:800;color:var(--nero);margin-bottom:8px">Chat AI</div><div style="font-size:14px;color:var(--grigio-lt);line-height:1.7;max-width:340px">Assistente AI per aggiornare magazzino, ordini e spese in linguaggio naturale.<br><br><span style="color:#8A6D3B;font-weight:600">In costruzione</span> — disponibile presto.</div>';
  el.appendChild(d);
}

// ── LOGO ANIMAZIONE INGRESSO ──
(function(){
  const svg=document.getElementById('hub-master-svg'); if(!svg) return;
  const G=svg.querySelector('.logo-G'), D=svg.querySelector('.logo-D');
  const C=svg.querySelector('.logo-C'), STUFF=svg.querySelector('.logo-STUFF');
  const linee=svg.querySelector('.logo-linee');
  [G,D,C,STUFF,linee].forEach(el=>{ el.style.opacity='0'; el.style.transition='opacity .22s ease'; });
  setTimeout(()=>G.style.opacity='1',     200);
  setTimeout(()=>D.style.opacity='1',     460);
  setTimeout(()=>C.style.opacity='1',     720);
  setTimeout(()=>STUFF.style.opacity='1', 980);
  setTimeout(()=>linee.style.opacity='1',1240);
})();
</script>
