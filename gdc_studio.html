<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#F7F8FA;font-family:system-ui,-apple-system,sans-serif;font-size:14px;min-height:100vh;}
input,textarea,button{font-family:inherit;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;background:#fff;border-bottom:1px solid #E5E7EB;position:sticky;top:0;z-index:100;gap:12px;}
@media(max-width:768px){
  .topbar{flex-wrap:wrap;height:auto;padding:8px 12px 0;gap:6px;}
  .logo-row{flex-shrink:0;}
  .topbar-right{order:1;margin-left:auto;}
  .nav-tabs-wrap{display:none;}
  .nav-tabs{order:2;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;justify-content:flex-start;padding-bottom:4px;scrollbar-width:none;}
  .nav-tabs::-webkit-scrollbar{display:none;}
  .ntab{font-size:12px;padding:6px 10px;white-space:nowrap;flex-shrink:0;}
  .ntab-icon{font-size:13px;}
  .content{padding:12px;}
  .mobile-nav-bar{display:flex!important;}
}
.logo-row{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.logo-box{width:28px;height:28px;border-radius:7px;background:#111827;display:flex;align-items:center;justify-content:center;font-size:14px;}
.logo-name{font-size:14px;font-weight:800;color:#111827;letter-spacing:-.02em;}
.logo-sub{font-size:10px;color:#9CA3AF;}

/* NAV TABS - horizontal top */
.nav-tabs{display:flex;gap:2px;flex:1;justify-content:center;}
.ntab{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:#6B7280;transition:all .12s;white-space:nowrap;}
.ntab:hover{background:#F3F4F6;color:#111827;}
.ntab.on{background:#111827;color:#fff;}
.ntab-icon{font-size:14px;}

.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.save-btn{padding:5px 14px;border-radius:20px;border:none;font-weight:700;font-size:11px;cursor:pointer;transition:background .3s;}
.hub-btn{padding:5px 12px;border-radius:20px;background:#F3F4F6;color:#6B7280;border:none;font-weight:700;font-size:11px;cursor:pointer;}
.hub-btn:hover{background:#E5E7EB;color:#111827;}

/* CONTENT */
.content{padding:20px;max-width:1200px;margin:0 auto;}

/* CARDS */
.card{background:#fff;border-radius:12px;border:1px solid #E5E7EB;padding:14px;margin-bottom:10px;}
.lbl{font-size:10px;font-weight:700;color:#9CA3AF;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.inp{width:100%;padding:9px 11px;border-radius:8px;border:1px solid #E5E7EB;font-size:13px;color:#111827;background:#fff;outline:none;box-sizing:border-box;}
.inp:focus{border-color:#111827;}
.btn{padding:10px 16px;border-radius:9px;border:none;font-weight:700;font-size:13px;cursor:pointer;width:100%;}
.btn-p{background:#111827;color:#fff;}
.btn-p:hover{background:#374151;}
.btn-s{background:#F3F4F6;color:#111827;}
.btn-s:hover{background:#E5E7EB;}
.btn-g{background:#16A34A;color:#fff;}
.btn-g:hover{background:#15803D;}
.btn-gh{background:transparent;color:#6B7280;border:1px solid #E5E7EB;}
.btn-gh:hover{background:#F3F4F6;}
.btn-o{background:#EA580C;color:#fff;}
.btn-sm{padding:7px 12px;font-size:12px;}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}

/* PAGE LAYOUT */
.page-2col{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;}
.page-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;align-items:start;}

.ttl{font-size:18px;font-weight:800;color:#111827;letter-spacing:-.02em;margin-bottom:16px;}
.pill{padding:3px 9px;border-radius:20px;border:1.5px solid;font-size:10px;font-weight:700;cursor:pointer;background:transparent;display:inline-block;}
.subtabs{display:flex;gap:6px;margin-bottom:14px;}
.stab{flex:1;padding:7px;border-radius:8px;border:1.5px solid;font-weight:700;font-size:12px;cursor:pointer;background:#fff;transition:all .1s;}

/* FILAMENT BAR */
.fil-bar{height:4px;background:#E5E7EB;border-radius:2px;margin-bottom:4px;}
.fil-fill{height:100%;border-radius:2px;}

/* HARDWARE MAP */
#hw-map{position:relative;height:520px;background:#FAFAFA;border-radius:12px;border:1px solid #E5E7EB;overflow:hidden;margin-bottom:12px;user-select:none;touch-action:none;}
@media(min-width:1200px){#hw-map{height:600px;}}
@media(max-width:768px){#hw-map{height:380px;}}
.hw-center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:10;text-align:center;}
.hw-item{position:absolute;z-index:20;background:#fff;border-radius:10px;padding:8px 10px;min-width:100px;max-width:130px;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:grab;touch-action:none;}
.hw-item:active{cursor:grabbing;}

/* STATS BAR */
.stat-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.stat-box{background:#fff;border-radius:10px;border:1px solid #E5E7EB;padding:12px 14px;}
.stat-n{font-size:22px;font-weight:300;letter-spacing:-.02em;}
.stat-l{font-size:10px;color:#9CA3AF;text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}

/* ORDER CARD */
.order-card{background:#fff;border-radius:10px;border:1px solid #E5E7EB;padding:12px;margin-bottom:8px;}

/* RESPONSIVE */
@media(max-width:900px){
  .page-2col,.page-3col{grid-template-columns:1fr;}
  .g4{grid-template-columns:1fr 1fr;}
  .nav-tabs{gap:0;}
  .ntab{padding:5px 8px;font-size:12px;}
  .ntab-icon{display:none;}
  .stat-bar{grid-template-columns:1fr 1fr;}
}
@media(max-width:600px){
  .topbar{padding:0 12px;}
  .nav-tabs{justify-content:flex-start;overflow-x:auto;}
  .ntab{font-size:11px;padding:5px 7px;}
  .content{padding:12px;}
  .g2,.g3{grid-template-columns:1fr;}
}
</style>
</head>

  const r=await fetch(SB_URL+'/rest/v1/'+tbl,{method:'POST',headers:{...sbH(),'Prefer':prefer},body:JSON.stringify(data)});
  if(!r.ok){const err=await r.text();console.error('sbPost error',tbl,r.status,err);throw new Error(err);}
}
async function sbDel(tbl,id){
  await fetch(SB_URL+'/rest/v1/'+tbl+'?id=eq.'+id+'&user_id=eq.'+_userId,{method:'DELETE',headers:sbH()});
}

function toSnake(o){
  const m={grammiResidui:'grammi_residui',grammiTotali:'grammi_totali',prezzoPagato:'prezzo_pagato',bobinaUsage:'bobina_usage'};
  const r={};Object.entries(o).forEach(([k,v])=>{r[m[k]||k]=v;});return r;
}
function fromRow(r){
  return{id:r.id,colore:r.colore,tipo:r.tipo,grammiTotali:r.grammi_totali,grammiResidui:r.grammi_residui,prezzoPagato:r.prezzo_pagato,data:r.data,
    nome:r.nome,sottotitolo:r.sottotitolo,cliente:r.cliente,pezzi:r.pezzi,stato:r.stato,prezzo:r.prezzo,pagato:r.pagato,bobinaUsage:r.bobina_usage||[],
    descrizione:r.descrizione,importo:r.importo,categoria:r.categoria,note:r.note,x:r.x,y:r.y};
}

async function loadData(){
  try{
    const [f,o,e,p,h]=await Promise.all([
      sbGet('studio_filaments'),sbGet('studio_orders'),
      sbGet('studio_expenses'),sbGet('studio_projects'),sbGet('studio_hardware')
    ]);
    // NEVER auto-seed — only load what's in DB or use in-memory fallback
    filaments = f.length ? f.map(fromRow) : SEED_F;
    orders    = o.length ? o.map(fromRow) : SEED_O;
    expenses  = e.length ? e.map(fromRow) : SEED_E;
    hardware  = h.length ? h.map(fromRow) : SEED_HW;
    projects  = p.length ? p.map(r=>({...(r.data||{}),id:r.id})) : [];
  }catch(err){
    console.error('Load error',err);
    filaments=SEED_F;orders=SEED_O;expenses=SEED_E;hardware=SEED_HW;projects=[];
  }
}

function doCalc(){
  const f=calcFields;
  const allBobine=[...filaments.filter(b=>b.grammiResidui>0),...(f.tempBobine||[])];
  const pezzi=parseInt(f.qty)||1;
  let costoFil=0;(f.bobinaUsage||[]).forEach(bu=>{const bob=allBobine.find(b=>b.id===bu.id);const g=parseFloat(bu.grammi)||0;if(bob&&g>0)costoFil+=(g/bob.grammiTotali)*bob.prezzoPagato;});
  const costoEnergia=(parseFloat(f.kwh)||0)*(parseFloat(f.energyRate)||ER);
  const pc={"Rimozione supporti":1.5,"Levigatura":3,"Colorazione base":4,"Colorazione avanzata":8,"Assemblaggio":5,"Finitura lucida":6,"Altro":3};
  const costoPost=(f.postProd||[]).reduce((a,p)=>a+(pc[p]||2),0);
  const sub=costoFil+costoEnergia+costoPost;
  const prezzoPezzo=sub*RM[f.risk]*PM[f.perceived];
  calcResult={costoFil,costoEnergia,costoPost,prezzoPezzo,prezzoConsigliato:prezzoPezzo*pezzi,pezzi};
  render();
}

function saveProjCalc(){
  const id=calcEditId||Date.now();
  const proj={id,fields:{...calcFields},result:calcResult,nome:calcFields.projectName||'Progetto senza nome',data:todayIT()};
  if(calcEditId)projects=projects.map(p=>p.id===id?proj:p);else projects=[proj,...projects];
  setSS('saving');sbPost('studio_projects',{id,data:proj}).then(()=>setSS('saved')).catch(()=>setSS('saved'));
  calcView='list';render();
}
function sendToOrders(){
  if(!calcResult)return;
  const o={id:Date.now(),nome:calcFields.projectName||'Stampa senza nome',sottotitolo:'',cliente:'',pezzi:calcFields.qty,stato:'lavorazione',prezzo:calcResult.prezzoConsigliato.toFixed(2),pagato:false,data:todayIT(),bobinaUsage:calcFields.bobinaUsage||[]};
  orders=[o,...orders];
  setSS('saving');sbPost('studio_orders',o).then(()=>setSS('saved')).catch(()=>setSS('saved'));
  if(calcEditId){projects=projects.filter(p=>p.id!==calcEditId);sbDel('studio_projects',calcEditId);}
  calcView='list';render();
}

function updateSvgLines(){

  const cx=w/2,cy=h2/2;
  svg.innerHTML='';

    line.setAttribute('x1',cx);line.setAttribute('y1',cy);

    line.setAttribute('stroke','#D1D5DB');line.setAttribute('stroke-width','1.5');line.setAttribute('stroke-dasharray','4,3');
    svg.appendChild(line);
  });
}

    let dragging=false,ox=0,oy=0;

    },{passive:false});
    d.addEventListener('touchend',function(){
      if(dragging){dragging=false;updHW(h.id,'x',h.x);updHW(h.id,'y',h.y);}
    });
    mapDiv.appendChild(d);
  });
  const hint=mk('div','');hint.style.cssText='position:absolute;bottom:8px;right:10px;font-size:10px;color:#9CA3AF';hint.textContent='trascina per spostare';mapDiv.appendChild(hint);
  left.appendChild(mapDiv);left.appendChild(btn('+ Aggiungi componente',()=>showAddHW(el),'s'));
  layout.appendChild(left);

  // Right: list
  const right=mk('div','');
  right.innerHTML='<div style="font-size:14px;font-weight:700;margin-bottom:12px">Componenti</div>';
  hardware.forEach(h=>{
    const st=SHW[h.stato]||SHW.ok;
    const c=card();c.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:10px 12px';
    c.innerHTML='<div><div style="font-size:14px">'+(TIPI[h.tipo]||'📦')+' <strong>'+h.nome+'</strong></div><div style="font-size:11px;color:#9CA3AF;margin-top:2px">'+h.tipo+' · '+h.data+'</div>'+(h.note?'<div style="font-size:11px;color:#6B7280">'+h.note+'</div>':'')+'</div>';
    const r=mk('div','');r.style.cssText='display:flex;align-items:center;gap:8px';r.innerHTML='<span style="padding:3px 10px;border-radius:20px;background:'+st.color+'22;color:'+st.color+';font-size:11px;font-weight:700;border:1px solid '+st.color+'44">'+st.label+'</span>';
    if(h.tipo!=='stampante'){const db=mk('button','');db.textContent='✕';db.style.cssText='background:none;border:none;color:#9CA3AF;cursor:pointer;font-size:14px';db.onclick=()=>delHW(h.id);r.appendChild(db);}
    c.appendChild(r);right.appendChild(c);
  });
  layout.appendChild(right);el.appendChild(layout);
}

function updHW(id,k,v){hardware=hardware.map(h=>h.id===id?{...h,[k]:v}:h);setSS('saving');sbPatch('studio_hardware',id,{[k]:v}).then(()=>setSS('saved')).catch(()=>setSS('saved'));}
function delHW(id){hardware=hardware.filter(h=>h.id!==id);sbDel('studio_hardware',id);renderHardware(document.getElementById('content'));}
function showAddHW(el){
  const form={nome:'',tipo:'accessorio',stato:'ok',note:'',data:''};
  const c=card();c.appendChild(lbl('Nuovo componente'));
  const ni=inp('Nome','',v=>form.nome=v);ni.style.marginBottom='8px';c.appendChild(ni);
  const tipiDiv=mk('div','g4');tipiDiv.style.marginBottom='8px';
  Object.entries(TIPI).forEach(([k,v])=>{const b=mk('button','stab');b.style.cssText='padding:8px 4px;font-size:10px;font-weight:700;border-color:'+(form.tipo===k?'#111827':'#E5E7EB')+';background:'+(form.tipo===k?'#F3F4F6':'#fff');b.innerHTML=v+'<br>'+k;b.onclick=e=>{e.preventDefault();form.tipo=k;showAddHW(el);};tipiDiv.appendChild(b);});
  c.appendChild(tipiDiv);
  const ni2=inp('Note (opz.)','',v=>form.note=v);ni2.style.marginBottom='8px';c.appendChild(ni2);
  const ni3=inp('Data acquisto','',v=>form.data=v);ni3.style.marginBottom='8px';c.appendChild(ni3);
  c.appendChild(g2([btn('Aggiungi',()=>{if(!form.nome)return;const angle=Math.random()*Math.PI*2,dist=140+Math.random()*30;const hw={id:Date.now(),...form,data:form.data||todayIT(),x:Math.round(Math.cos(angle)*dist),y:Math.round(Math.sin(angle)*dist)};hardware=[...hardware,hw];setSS('saving');sbPost('studio_hardware',hw).then(()=>setSS('saved')).catch(()=>setSS('saved'));renderHardware(document.getElementById('content'));},'g',true),btn('Annulla',()=>renderHardware(document.getElementById('content')),'gh',true)]));
  el.prepend(c);
}

// ── CHAT ──
function renderChat(el){
  el.removeAttribute('style');
  const d=mk('div','');
  d.style.cssText='display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:40px 20px';
  d.innerHTML='<div style="font-size:52px;margin-bottom:18px">💬</div><div style="font-size:20px;font-weight:800;color:#111827;margin-bottom:8px">Chat AI</div><div style="font-size:14px;color:#9CA3AF;line-height:1.7;max-width:340px">Assistente AI per aggiornare magazzino, ordini e spese in linguaggio naturale.<br><br><span style="color:#D97706;font-weight:600">In costruzione</span> — disponibile presto.</div>';
  el.appendChild(d);
}
</script>
